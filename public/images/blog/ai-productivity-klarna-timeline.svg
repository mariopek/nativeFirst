<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" width="900" height="350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="350" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">The Klarna Story: A Cautionary Tale</text>

  <!-- Timeline line -->
  <line x1="80" y1="160" x2="820" y2="160" stroke="#374151" stroke-width="2"/>

  <!-- Point 1: Feb 2024 -->
  <g transform="translate(140, 160)">
    <circle cx="0" cy="0" r="8" fill="#22c55e" opacity="0.8" filter="url(#glow)"/>
    <line x1="0" y1="-8" x2="0" y2="-50" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
    <text x="0" y="-60" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Feb 2024</text>
    <text x="0" y="-42" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="10">"AI does the work of 700"</text>
    <text x="0" y="30" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">CEO Siemiatkowski</text>
    <text x="0" y="45" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">announces AI replaces</text>
    <text x="0" y="60" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">700 customer agents</text>
  </g>

  <!-- Point 2: Late 2024 -->
  <g transform="translate(370, 160)">
    <circle cx="0" cy="0" r="8" fill="#f59e0b" opacity="0.8" filter="url(#glow)"/>
    <line x1="0" y1="8" x2="0" y2="50" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    <text x="0" y="-20" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Late 2024</text>
    <text x="0" y="68" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="10">Quality tanks.</text>
    <text x="0" y="83" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="10">Customer satisfaction drops.</text>
    <text x="0" y="98" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="10">AI can't handle complex cases.</text>
  </g>

  <!-- Point 3: Sep 2025 -->
  <g transform="translate(600, 160)">
    <circle cx="0" cy="0" r="8" fill="#ef4444" opacity="0.8" filter="url(#glow)"/>
    <line x1="0" y1="-8" x2="0" y2="-50" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
    <text x="0" y="-60" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Sep 2025</text>
    <text x="0" y="-42" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="11" font-weight="600">"We want to rehire"</text>
    <text x="0" y="30" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">Siemiatkowski admits</text>
    <text x="0" y="45" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">AI went too far.</text>
    <text x="0" y="60" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">Starts rehiring humans.</text>
  </g>

  <!-- Point 4: 2026 -->
  <g transform="translate(780, 160)">
    <circle cx="0" cy="0" r="8" fill="#9333ea" opacity="0.8" filter="url(#glow)"/>
    <line x1="0" y1="8" x2="0" y2="50" stroke="#9333ea" stroke-width="1" opacity="0.5"/>
    <text x="0" y="-20" text-anchor="middle" fill="#9333ea" font-family="system-ui, sans-serif" font-size="13" font-weight="700">2026</text>
    <text x="0" y="68" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="10">IPO valuation drops</text>
    <text x="0" y="83" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="10">from $6.7B to below</text>
    <text x="0" y="98" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="10">expectations.</text>
  </g>

  <!-- Bottom quote -->
  <text x="450" y="310" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="12" font-style="italic" opacity="0.7">"We went too far. Quality matters more than cost savings."</text>
  <text x="450" y="330" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="10">— Sebastian Siemiatkowski, Klarna CEO</text>
</svg>