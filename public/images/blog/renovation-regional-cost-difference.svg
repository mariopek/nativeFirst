<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="400" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="19" font-weight="bold" fill="#f8fafc">Same Remodel, Different Region, Different Price</text>
  <line x1="220" y1="50" x2="580" y2="50" stroke="#f97316" stroke-width="2" opacity="0.6"/>

  <!-- Simplified US map outline (abstract) -->
  <g transform="translate(60, 65)" opacity="0.08">
    <rect x="0" y="0" width="680" height="200" rx="20" fill="#f97316"/>
  </g>

  <!-- Northeast -->
  <g transform="translate(530, 75)" font-family="system-ui, -apple-system, sans-serif" filter="url(#shadow)">
    <rect x="0" y="0" width="220" height="90" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="18" cy="18" r="6" fill="#ef4444"/>
    <text x="32" y="22" font-size="13" font-weight="bold" fill="#ef4444">Northeast</text>
    <text x="15" y="48" font-size="12" fill="#94a3b8">Mid-range kitchen:</text>
    <text x="15" y="68" font-size="20" font-weight="bold" fill="#ef4444">$45,000 - $75,000</text>
    <text x="15" y="84" font-size="10" fill="#94a3b8">NYC, Boston, Philadelphia</text>
  </g>

  <!-- Southeast -->
  <g transform="translate(430, 185)" font-family="system-ui, -apple-system, sans-serif" filter="url(#shadow)">
    <rect x="0" y="0" width="220" height="90" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
    <circle cx="18" cy="18" r="6" fill="#f97316"/>
    <text x="32" y="22" font-size="13" font-weight="bold" fill="#f97316">Southeast</text>
    <text x="15" y="48" font-size="12" fill="#94a3b8">Mid-range kitchen:</text>
    <text x="15" y="68" font-size="20" font-weight="bold" fill="#f97316">$30,000 - $55,000</text>
    <text x="15" y="84" font-size="10" fill="#94a3b8">Atlanta, Charlotte, Miami</text>
  </g>

  <!-- Midwest -->
  <g transform="translate(170, 95)" font-family="system-ui, -apple-system, sans-serif" filter="url(#shadow)">
    <rect x="0" y="0" width="220" height="90" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="18" cy="18" r="6" fill="#22c55e"/>
    <text x="32" y="22" font-size="13" font-weight="bold" fill="#22c55e">Midwest</text>
    <text x="15" y="48" font-size="12" fill="#94a3b8">Mid-range kitchen:</text>
    <text x="15" y="68" font-size="20" font-weight="bold" fill="#22c55e">$25,000 - $45,000</text>
    <text x="15" y="84" font-size="10" fill="#94a3b8">Chicago, Columbus, KC</text>
  </g>

  <!-- West Coast -->
  <g transform="translate(50, 195)" font-family="system-ui, -apple-system, sans-serif" filter="url(#shadow)">
    <rect x="0" y="0" width="220" height="90" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="18" cy="18" r="6" fill="#a78bfa"/>
    <text x="32" y="22" font-size="13" font-weight="bold" fill="#a78bfa">West Coast</text>
    <text x="15" y="48" font-size="12" fill="#94a3b8">Mid-range kitchen:</text>
    <text x="15" y="68" font-size="20" font-weight="bold" fill="#a78bfa">$40,000 - $70,000</text>
    <text x="15" y="84" font-size="10" fill="#94a3b8">LA, SF, Seattle, Portland</text>
  </g>

  <!-- Spread indicator -->
  <g transform="translate(80, 310)" font-family="system-ui, -apple-system, sans-serif">
    <rect x="0" y="0" width="640" height="70" rx="12" fill="#1e293b" opacity="0.9" stroke="#f97316" stroke-width="1"/>

    <!-- Price range bar -->
    <rect x="30" y="15" width="580" height="14" rx="7" fill="#0f172a"/>
    <rect x="30" y="15" width="580" height="14" rx="7" fill="url(#rangeGrad)" opacity="0.6"/>
    <circle cx="100" cy="22" r="7" fill="#22c55e" stroke="#0f172a" stroke-width="2"/>
    <circle cx="390" cy="22" r="7" fill="#f97316" stroke="#0f172a" stroke-width="2"/>
    <circle cx="540" cy="22" r="7" fill="#ef4444" stroke="#0f172a" stroke-width="2"/>

    <text x="100" y="50" text-anchor="middle" font-size="11" fill="#22c55e">$25K</text>
    <text x="390" y="50" text-anchor="middle" font-size="11" fill="#f97316">$50K</text>
    <text x="540" y="50" text-anchor="middle" font-size="11" fill="#ef4444">$75K</text>

    <text x="320" y="65" text-anchor="middle" font-size="11" fill="#94a3b8">30-40% price difference between regions for the exact same work</text>
  </g>

  <!-- Gradient for range bar -->
  <defs>
    <linearGradient id="rangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.5" />
    </linearGradient>
  </defs>
</svg>
