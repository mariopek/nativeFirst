<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f1a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boomerangGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.4" />
    </linearGradient>
    <linearGradient id="buildingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:0.9" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Office building on the right -->
  <g filter="url(#shadow)">
    <rect x="820" y="120" width="280" height="420" rx="6" fill="url(#buildingGrad)" stroke="#4b5563" stroke-width="1"/>
    <!-- Windows - rows of office lights -->
    <g opacity="0.6">
      <!-- Row 1 -->
      <rect x="845" y="150" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.8"/>
      <rect x="885" y="150" width="30" height="25" rx="2" fill="#60a5fa" opacity="0.5"/>
      <rect x="925" y="150" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.6"/>
      <rect x="965" y="150" width="30" height="25" rx="2" fill="#1f2937" opacity="0.8"/>
      <rect x="1005" y="150" width="30" height="25" rx="2" fill="#60a5fa" opacity="0.4"/>
      <rect x="1045" y="150" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.7"/>
      <!-- Row 2 -->
      <rect x="845" y="195" width="30" height="25" rx="2" fill="#1f2937" opacity="0.8"/>
      <rect x="885" y="195" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.7"/>
      <rect x="925" y="195" width="30" height="25" rx="2" fill="#60a5fa" opacity="0.5"/>
      <rect x="965" y="195" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.6"/>
      <rect x="1005" y="195" width="30" height="25" rx="2" fill="#1f2937" opacity="0.8"/>
      <rect x="1045" y="195" width="30" height="25" rx="2" fill="#60a5fa" opacity="0.4"/>
      <!-- Row 3 -->
      <rect x="845" y="240" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.5"/>
      <rect x="885" y="240" width="30" height="25" rx="2" fill="#1f2937" opacity="0.8"/>
      <rect x="925" y="240" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.8"/>
      <rect x="965" y="240" width="30" height="25" rx="2" fill="#60a5fa" opacity="0.6"/>
      <rect x="1005" y="240" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.4"/>
      <rect x="1045" y="240" width="30" height="25" rx="2" fill="#1f2937" opacity="0.8"/>
      <!-- Row 4 -->
      <rect x="845" y="285" width="30" height="25" rx="2" fill="#60a5fa" opacity="0.4"/>
      <rect x="885" y="285" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.6"/>
      <rect x="925" y="285" width="30" height="25" rx="2" fill="#1f2937" opacity="0.8"/>
      <rect x="965" y="285" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.7"/>
      <rect x="1005" y="285" width="30" height="25" rx="2" fill="#60a5fa" opacity="0.5"/>
      <rect x="1045" y="285" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.5"/>
      <!-- Row 5 -->
      <rect x="845" y="330" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.7"/>
      <rect x="885" y="330" width="30" height="25" rx="2" fill="#60a5fa" opacity="0.6"/>
      <rect x="925" y="330" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.4"/>
      <rect x="965" y="330" width="30" height="25" rx="2" fill="#1f2937" opacity="0.8"/>
      <rect x="1005" y="330" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.8"/>
      <rect x="1045" y="330" width="30" height="25" rx="2" fill="#60a5fa" opacity="0.4"/>
      <!-- Row 6 -->
      <rect x="845" y="375" width="30" height="25" rx="2" fill="#1f2937" opacity="0.8"/>
      <rect x="885" y="375" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.5"/>
      <rect x="925" y="375" width="30" height="25" rx="2" fill="#60a5fa" opacity="0.5"/>
      <rect x="965" y="375" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.6"/>
      <rect x="1005" y="375" width="30" height="25" rx="2" fill="#60a5fa" opacity="0.3"/>
      <rect x="1045" y="375" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.7"/>
      <!-- Row 7 -->
      <rect x="845" y="420" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.6"/>
      <rect x="885" y="420" width="30" height="25" rx="2" fill="#1f2937" opacity="0.8"/>
      <rect x="925" y="420" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.7"/>
      <rect x="965" y="420" width="30" height="25" rx="2" fill="#60a5fa" opacity="0.4"/>
      <rect x="1005" y="420" width="30" height="25" rx="2" fill="#fbbf24" opacity="0.5"/>
      <rect x="1045" y="420" width="30" height="25" rx="2" fill="#1f2937" opacity="0.8"/>
    </g>
    <!-- Building door -->
    <rect x="930" y="475" width="60" height="65" rx="3" fill="#111827" stroke="#4b5563" stroke-width="1"/>
  </g>

  <!-- Curved boomerang arrow from building outward and back -->
  <g filter="url(#softGlow)">
    <!-- Outgoing path (top, going left) - "FIRED" -->
    <path d="M 810 200 Q 500 80 250 200" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="12,6" opacity="0.6"/>
    <!-- Returning path (bottom, coming back) - "REHIRED" -->
    <path d="M 250 350 Q 500 480 810 350" fill="none" stroke="#22c55e" stroke-width="3" opacity="0.7"/>
    <!-- Arrow head on return path -->
    <polygon points="810,350 790,335 790,365" fill="#22c55e" opacity="0.7"/>
  </g>

  <!-- Person figure walking away (top path) -->
  <g transform="translate(380, 115)" opacity="0.6">
    <!-- Head -->
    <circle cx="0" cy="0" r="12" fill="#ef4444" opacity="0.7"/>
    <!-- Body -->
    <line x1="0" y1="12" x2="0" y2="38" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
    <!-- Arms (carrying box) -->
    <line x1="-12" y1="22" x2="12" y2="22" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
    <!-- Box -->
    <rect x="-10" y="16" width="20" height="14" rx="2" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
    <!-- Legs walking -->
    <line x1="0" y1="38" x2="-10" y2="55" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
    <line x1="0" y1="38" x2="10" y2="55" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
  </g>

  <!-- Person figure walking back (bottom path) -->
  <g transform="translate(550, 395)" opacity="0.8">
    <!-- Head -->
    <circle cx="0" cy="0" r="12" fill="#22c55e" opacity="0.8"/>
    <!-- Body -->
    <line x1="0" y1="12" x2="0" y2="38" stroke="#22c55e" stroke-width="2.5" opacity="0.8"/>
    <!-- Arms -->
    <line x1="-14" y1="24" x2="14" y2="24" stroke="#22c55e" stroke-width="2.5" opacity="0.8"/>
    <!-- Legs walking -->
    <line x1="0" y1="38" x2="10" y2="55" stroke="#22c55e" stroke-width="2.5" opacity="0.8"/>
    <line x1="0" y1="38" x2="-10" y2="55" stroke="#22c55e" stroke-width="2.5" opacity="0.8"/>
  </g>

  <!-- "FIRED" label on top path -->
  <g transform="translate(320, 108)">
    <rect x="-40" y="-14" width="80" height="28" rx="14" fill="#ef4444" opacity="0.2"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ef4444" letter-spacing="2">FIRED</text>
  </g>

  <!-- "REHIRED" label on bottom path -->
  <g transform="translate(660, 460)">
    <rect x="-50" y="-14" width="100" height="28" rx="14" fill="#22c55e" opacity="0.2"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#22c55e" letter-spacing="2">REHIRED</text>
  </g>

  <!-- Stats floating -->
  <!-- 55% stat -->
  <g transform="translate(120, 240)">
    <rect x="-55" y="-30" width="110" height="60" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="800" fill="#f59e0b" filter="url(#glow)">55%</text>
    <text x="0" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#9ca3af" letter-spacing="1">REGRET IT</text>
  </g>

  <!-- 80K stat -->
  <g transform="translate(120, 380)">
    <rect x="-55" y="-30" width="110" height="60" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#ef4444" filter="url(#glow)">80K</text>
    <text x="0" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#9ca3af" letter-spacing="1">JOBS CUT</text>
  </g>

  <!-- 1 in 3 stat -->
  <g transform="translate(690, 290)">
    <rect x="-55" y="-30" width="110" height="60" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#a78bfa" filter="url(#glow)">1 in 3</text>
    <text x="0" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#9ca3af" letter-spacing="1">PAID MORE</text>
  </g>

  <!-- Bottom bar with title -->
  <rect x="0" y="540" width="1200" height="90" fill="#000" opacity="0.5"/>
  <text x="600" y="578" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#e5e7eb" letter-spacing="0.5">THE GREAT AI LAYOFF BOOMERANG</text>
  <text x="600" y="605" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#9ca3af" letter-spacing="1">THEY FIRED 80,000 DEVELOPERS. THEN THE AI NEEDED A DEVELOPER.</text>
</svg>
