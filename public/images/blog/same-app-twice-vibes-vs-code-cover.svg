<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <line x1="100" y1="0" x2="100" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#94a3b8" stroke-width="1"/>
  </g>

  <!-- LEFT: Vibes Build -->
  <g transform="translate(60, 55)">
    <!-- Label -->
    <rect x="0" y="0" width="500" height="36" rx="8" fill="#ef4444" opacity="0.15"/>
    <text x="250" y="24" text-anchor="middle" fill="#fca5a5" font-family="Arial, sans-serif" font-weight="bold" font-size="16">ROUND 1: VIBES ONLY</text>

    <!-- Timer -->
    <text x="20" y="70" fill="#94a3b8" font-family="monospace" font-size="13">Build time:</text>
    <text x="130" y="70" fill="#4ade80" font-family="monospace" font-size="13" font-weight="bold">3 hours 12 min</text>

    <!-- App window -->
    <rect x="0" y="85" width="500" height="250" rx="10" fill="#1a1a2e" stroke="#374151" stroke-width="1.5"/>
    <rect x="0" y="85" width="500" height="30" rx="10" fill="#252540"/>
    <rect x="0" y="105" width="500" height="10" fill="#252540"/>
    <circle cx="18" cy="100" r="5" fill="#ef4444"/>
    <circle cx="36" cy="100" r="5" fill="#fbbf24"/>
    <circle cx="54" cy="100" r="5" fill="#22c55e"/>
    <text x="250" y="103" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="11">ExpenseTracker v1 — vibes build</text>

    <!-- App content - looks good but broken -->
    <rect x="15" y="125" width="470" height="35" rx="6" fill="#22c55e" opacity="0.1"/>
    <text x="25" y="147" fill="#4ade80" font-family="monospace" font-size="12">✓ Beautiful UI, animations, dark mode</text>

    <rect x="15" y="168" width="470" height="35" rx="6" fill="#22c55e" opacity="0.1"/>
    <text x="25" y="190" fill="#4ade80" font-family="monospace" font-size="12">✓ Auth works, expenses load, charts render</text>

    <rect x="15" y="211" width="470" height="35" rx="6" fill="#ef4444" opacity="0.1"/>
    <text x="25" y="233" fill="#fca5a5" font-family="monospace" font-size="12">✗ JWT tokens never expire (auth bypass)</text>

    <rect x="15" y="254" width="470" height="35" rx="6" fill="#ef4444" opacity="0.1"/>
    <text x="25" y="276" fill="#fca5a5" font-family="monospace" font-size="12">✗ No rate limiting, SQL injectable, XSS vuln</text>

    <rect x="15" y="297" width="470" height="28" rx="6" fill="#ef4444" opacity="0.15"/>
    <text x="25" y="315" fill="#ef4444" font-family="monospace" font-size="12" font-weight="bold">SECURITY SCAN: 9 critical, 14 warnings</text>
  </g>

  <!-- RIGHT: Code Build -->
  <g transform="translate(640, 55)">
    <!-- Label -->
    <rect x="0" y="0" width="500" height="36" rx="8" fill="#22c55e" opacity="0.15"/>
    <text x="250" y="24" text-anchor="middle" fill="#86efac" font-family="Arial, sans-serif" font-weight="bold" font-size="16">ROUND 2: CODE + AI</text>

    <!-- Timer -->
    <text x="20" y="70" fill="#94a3b8" font-family="monospace" font-size="13">Build time:</text>
    <text x="130" y="70" fill="#fbbf24" font-family="monospace" font-size="13" font-weight="bold">6 hours 45 min</text>

    <!-- App window -->
    <rect x="0" y="85" width="500" height="250" rx="10" fill="#1a1a2e" stroke="#374151" stroke-width="1.5"/>
    <rect x="0" y="85" width="500" height="30" rx="10" fill="#252540"/>
    <rect x="0" y="105" width="500" height="10" fill="#252540"/>
    <circle cx="18" cy="100" r="5" fill="#ef4444"/>
    <circle cx="36" cy="100" r="5" fill="#fbbf24"/>
    <circle cx="54" cy="100" r="5" fill="#22c55e"/>
    <text x="250" y="103" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="11">ExpenseTracker v2 — code + AI build</text>

    <!-- App content - solid -->
    <rect x="15" y="125" width="470" height="35" rx="6" fill="#22c55e" opacity="0.1"/>
    <text x="25" y="147" fill="#4ade80" font-family="monospace" font-size="12">✓ Clean UI, responsive, accessible</text>

    <rect x="15" y="168" width="470" height="35" rx="6" fill="#22c55e" opacity="0.1"/>
    <text x="25" y="190" fill="#4ade80" font-family="monospace" font-size="12">✓ Auth + bcrypt + JWT w/ 15min expiry + refresh</text>

    <rect x="15" y="211" width="470" height="35" rx="6" fill="#22c55e" opacity="0.1"/>
    <text x="25" y="233" fill="#4ade80" font-family="monospace" font-size="12">✓ Rate limiting, input sanitization, CSRF tokens</text>

    <rect x="15" y="254" width="470" height="35" rx="6" fill="#22c55e" opacity="0.1"/>
    <text x="25" y="276" fill="#4ade80" font-family="monospace" font-size="12">✓ 34 tests passing, 91% coverage, CI/CD ready</text>

    <rect x="15" y="297" width="470" height="28" rx="6" fill="#22c55e" opacity="0.15"/>
    <text x="25" y="315" fill="#22c55e" font-family="monospace" font-size="12" font-weight="bold">SECURITY SCAN: 0 critical, 2 info-only</text>
  </g>

  <!-- VS badge -->
  <g transform="translate(555, 200)">
    <rect x="0" y="0" width="90" height="50" rx="25" fill="#7c3aed" opacity="0.2" stroke="#a78bfa" stroke-width="2"/>
    <text x="45" y="32" text-anchor="middle" fill="#c4b5fd" font-family="Arial, sans-serif" font-weight="bold" font-size="22">VS</text>
  </g>

  <!-- Scoreboard -->
  <g transform="translate(60, 405)">
    <rect x="0" y="0" width="1080" height="110" rx="10" fill="#1e1b4b" opacity="0.5" stroke="#4338ca" stroke-width="1"/>
    <text x="540" y="28" text-anchor="middle" fill="#a5b4fc" font-family="Arial, sans-serif" font-weight="bold" font-size="15">FINAL SCORECARD</text>

    <!-- Headers -->
    <text x="270" y="52" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="11">VIBES</text>
    <text x="810" y="52" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="11">CODE + AI</text>

    <!-- Speed -->
    <text x="70" y="78" fill="#94a3b8" font-family="monospace" font-size="12">Speed</text>
    <text x="270" y="78" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="13" font-weight="bold">3h 12m ⚡</text>
    <text x="810" y="78" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="13">6h 45m</text>

    <!-- Security -->
    <text x="370" y="78" fill="#94a3b8" font-family="monospace" font-size="12">Security</text>
    <text x="540" y="78" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="13">9 critical 💀</text>
    <text x="1000" y="78" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="13" font-weight="bold">0 critical ✓</text>

    <!-- Maintainability -->
    <text x="70" y="100" fill="#94a3b8" font-family="monospace" font-size="12">Maintainability</text>
    <text x="270" y="100" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="13">0 tests, no docs</text>
    <text x="810" y="100" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="13" font-weight="bold">34 tests, 91% cov</text>

    <!-- Ship-ready -->
    <text x="370" y="100" fill="#94a3b8" font-family="monospace" font-size="12">Ship-ready?</text>
    <text x="540" y="100" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="13" font-weight="bold">HELL NO</text>
    <text x="1000" y="100" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="13" font-weight="bold">YES ✓</text>
  </g>

  <!-- Title -->
  <text x="600" y="555" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-weight="bold" font-size="32">
    I Built the Same App Twice: Vibes vs Code
  </text>
  <text x="600" y="585" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18">
    Same features. Same AI. Very different results.
  </text>

  <!-- Branding -->
  <text x="600" y="618" text-anchor="middle" fill="#7c3aed" font-family="Arial, sans-serif" font-weight="bold" font-size="14">nativefirstapp.com</text>
</svg>