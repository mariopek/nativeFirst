<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF7ED"/>
      <stop offset="40%" style="stop-color:#FFEDD5"/>
      <stop offset="100%" style="stop-color:#FED7AA"/>
    </linearGradient>
    <linearGradient id="tealAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488"/>
      <stop offset="100%" style="stop-color:#2DD4BF"/>
    </linearGradient>
    <linearGradient id="orangeAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA580C"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
    <linearGradient id="coralAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E11D48"/>
      <stop offset="100%" style="stop-color:#FB7185"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1C1917" flood-opacity="0.1"/>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#1C1917" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Warm cream background -->
  <rect width="1200" height="630" fill="url(#skyGrad)"/>

  <!-- Subtle dot grid pattern -->
  <g opacity="0.08">
    <circle cx="40" cy="40" r="2" fill="#92400E"/>
    <circle cx="80" cy="40" r="2" fill="#92400E"/>
    <circle cx="120" cy="40" r="2" fill="#92400E"/>
    <circle cx="160" cy="40" r="2" fill="#92400E"/>
    <circle cx="200" cy="40" r="2" fill="#92400E"/>
    <circle cx="240" cy="40" r="2" fill="#92400E"/>
    <circle cx="280" cy="40" r="2" fill="#92400E"/>
    <circle cx="320" cy="40" r="2" fill="#92400E"/>
    <circle cx="360" cy="40" r="2" fill="#92400E"/>
    <circle cx="400" cy="40" r="2" fill="#92400E"/>
    <circle cx="40" cy="80" r="2" fill="#92400E"/>
    <circle cx="80" cy="80" r="2" fill="#92400E"/>
    <circle cx="120" cy="80" r="2" fill="#92400E"/>
    <circle cx="160" cy="80" r="2" fill="#92400E"/>
    <circle cx="200" cy="80" r="2" fill="#92400E"/>
    <circle cx="240" cy="80" r="2" fill="#92400E"/>
    <circle cx="280" cy="80" r="2" fill="#92400E"/>
    <circle cx="320" cy="80" r="2" fill="#92400E"/>
    <circle cx="360" cy="80" r="2" fill="#92400E"/>
    <circle cx="400" cy="80" r="2" fill="#92400E"/>
    <circle cx="40" cy="120" r="2" fill="#92400E"/>
    <circle cx="80" cy="120" r="2" fill="#92400E"/>
    <circle cx="120" cy="120" r="2" fill="#92400E"/>
    <circle cx="160" cy="120" r="2" fill="#92400E"/>
    <circle cx="200" cy="120" r="2" fill="#92400E"/>
    <circle cx="240" cy="120" r="2" fill="#92400E"/>
    <circle cx="280" cy="120" r="2" fill="#92400E"/>
    <circle cx="320" cy="120" r="2" fill="#92400E"/>
    <circle cx="360" cy="120" r="2" fill="#92400E"/>
    <circle cx="400" cy="120" r="2" fill="#92400E"/>
  </g>

  <!-- Decorative blob shapes -->
  <ellipse cx="950" cy="100" rx="220" ry="180" fill="#0D9488" opacity="0.06"/>
  <ellipse cx="150" cy="500" rx="250" ry="200" fill="#EA580C" opacity="0.05"/>
  <ellipse cx="1050" cy="520" rx="180" ry="140" fill="#E11D48" opacity="0.04"/>

  <!-- Left side: Text -->
  <g transform="translate(80, 100)">
    <!-- Tag pill -->
    <rect x="0" y="0" width="210" height="34" rx="17" fill="#0D9488" opacity="0.12" stroke="#0D9488" stroke-width="1.5" stroke-opacity="0.3"/>
    <text x="105" y="23" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="13" fill="#0D9488" text-anchor="middle">PROMPTKIT DEEP DIVE</text>

    <!-- Title -->
    <text x="0" y="85" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="50" fill="#1C1917">Your Prompts</text>
    <text x="0" y="142" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="50" fill="#1C1917">Are Not</text>
    <text x="0" y="199" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="50" fill="url(#orangeAccent)">Skills. Yet.</text>

    <!-- Subtitle -->
    <text x="0" y="260" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="17" fill="#78716C">The difference between a prompt you use once</text>
    <text x="0" y="284" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="17" fill="#78716C">and a skill you use forever — and how to bridge the gap.</text>
  </g>

  <!-- Right side: Evolution diagram -->
  <g transform="translate(640, 80)" filter="url(#cardShadow)">
    <!-- Step 1: Raw Prompt -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="480" height="100" rx="16" fill="white" stroke="#E7E5E4" stroke-width="1.5"/>
      <rect x="16" y="20" width="60" height="60" rx="12" fill="#FEF2F2"/>
      <text x="46" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#EF4444" text-anchor="middle">1</text>
      <text x="92" y="38" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#1C1917">Raw Prompt</text>
      <text x="92" y="58" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="13" fill="#A8A29E">"write me a blog post about..."</text>
      <rect x="92" y="68" width="60" height="20" rx="10" fill="#FEE2E2"/>
      <text x="122" y="82" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="10" fill="#DC2626" text-anchor="middle">one-time</text>
      <rect x="158" y="68" width="50" height="20" rx="10" fill="#FEE2E2"/>
      <text x="183" y="82" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="10" fill="#DC2626" text-anchor="middle">vague</text>
    </g>

    <!-- Arrow 1 -->
    <g transform="translate(220, 105)">
      <line x1="0" y1="0" x2="0" y2="30" stroke="#D6D3D1" stroke-width="2" stroke-dasharray="4,4"/>
      <polygon points="-6,30 6,30 0,40" fill="#D6D3D1"/>
    </g>

    <!-- Step 2: Saved Prompt -->
    <g transform="translate(0, 150)">
      <rect x="0" y="0" width="480" height="100" rx="16" fill="white" stroke="#FDBA74" stroke-width="1.5"/>
      <rect x="16" y="20" width="60" height="60" rx="12" fill="#FFF7ED"/>
      <text x="46" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#EA580C" text-anchor="middle">2</text>
      <text x="92" y="38" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#1C1917">Saved Prompt</text>
      <text x="92" y="58" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="13" fill="#A8A29E">Tagged, categorized, findable</text>
      <rect x="92" y="68" width="55" height="20" rx="10" fill="#FFEDD5"/>
      <text x="119" y="82" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="10" fill="#EA580C" text-anchor="middle">saved</text>
      <rect x="153" y="68" width="65" height="20" rx="10" fill="#FFEDD5"/>
      <text x="185" y="82" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="10" fill="#EA580C" text-anchor="middle">organized</text>
    </g>

    <!-- Arrow 2 -->
    <g transform="translate(220, 255)">
      <line x1="0" y1="0" x2="0" y2="30" stroke="#D6D3D1" stroke-width="2" stroke-dasharray="4,4"/>
      <polygon points="-6,30 6,30 0,40" fill="#D6D3D1"/>
    </g>

    <!-- Step 3: Skill -->
    <g transform="translate(0, 300)">
      <rect x="0" y="0" width="480" height="130" rx="16" fill="white" stroke="#0D9488" stroke-width="2"/>
      <!-- Glow effect -->
      <rect x="-2" y="-2" width="484" height="134" rx="18" fill="none" stroke="#2DD4BF" stroke-width="1" opacity="0.3"/>
      <rect x="16" y="22" width="60" height="60" rx="12" fill="#F0FDFA"/>
      <text x="46" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#0D9488" text-anchor="middle">3</text>
      <text x="92" y="42" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#1C1917">Skill</text>
      <text x="92" y="62" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="13" fill="#A8A29E">Variables, workflows, refined, shared</text>
      <rect x="92" y="74" width="68" height="20" rx="10" fill="#CCFBF1"/>
      <text x="126" y="88" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="10" fill="#0D9488" text-anchor="middle">reusable</text>
      <rect x="166" y="74" width="80" height="20" rx="10" fill="#CCFBF1"/>
      <text x="206" y="88" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="10" fill="#0D9488" text-anchor="middle">{{variables}}</text>
      <rect x="252" y="74" width="72" height="20" rx="10" fill="#CCFBF1"/>
      <text x="288" y="88" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="10" fill="#0D9488" text-anchor="middle">shareable</text>
      <text x="92" y="118" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="12" fill="#0D9488" font-style="italic">Used 200+ times. Shared with 1.4k people.</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#1C1917" opacity="0.04"/>
  <text x="80" y="616" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="14" fill="#78716C">NativeFirst</text>
  <text x="1120" y="616" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="13" fill="#78716C" text-anchor="end">nativefirstapp.com</text>
</svg>