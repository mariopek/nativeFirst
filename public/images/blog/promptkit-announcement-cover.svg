<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0F14"/>
      <stop offset="50%" style="stop-color:#151520"/>
      <stop offset="100%" style="stop-color:#0F0F14"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3CE9"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1E2E"/>
      <stop offset="100%" style="stop-color:#16161F"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(100,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(200,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(300,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(400,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(500,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(600,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(700,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(800,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(900,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(1000,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" transform="translate(1100,0)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1" transform="translate(0,100)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1" transform="translate(0,200)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1" transform="translate(0,300)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1" transform="translate(0,400)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1" transform="translate(0,500)"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="350" cy="315" r="200" fill="#6C3CE9" opacity="0.08" filter="url(#glow)"/>
  <circle cx="850" cy="315" r="180" fill="#A78BFA" opacity="0.06" filter="url(#glow)"/>

  <!-- Left side: Text content -->
  <g transform="translate(80, 160)">
    <!-- Badge -->
    <rect x="0" y="0" width="160" height="32" rx="16" fill="#6C3CE9" opacity="0.2" stroke="#6C3CE9" stroke-width="1" stroke-opacity="0.4"/>
    <text x="80" y="21" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="13" fill="#A78BFA" text-anchor="middle">COMING SOON</text>

    <!-- Title -->
    <text x="0" y="80" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="48" fill="white">Where Do Your</text>
    <text x="0" y="135" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="48" fill="url(#purpleGrad)">AI Prompts</text>
    <text x="0" y="190" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="48" fill="white">Go to Die?</text>

    <!-- Subtitle -->
    <text x="0" y="240" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="18" fill="#9CA3AF">We surveyed 2,847 AI users. The answer is: everywhere.</text>
    <text x="0" y="265" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="18" fill="#9CA3AF">So we built PromptKit.</text>

    <!-- Stats row -->
    <g transform="translate(0, 300)">
      <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="28" fill="#6C3CE9">73%</text>
      <text x="0" y="22" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="12" fill="#6B7280">lose prompts</text>

      <text x="140" y="0" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="28" fill="#8B5CF6">68%</text>
      <text x="140" y="22" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="12" fill="#6B7280">rewrite same ones</text>

      <text x="300" y="0" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="28" fill="#A78BFA">41%</text>
      <text x="300" y="22" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="12" fill="#6B7280">scattered across 4+ apps</text>
    </g>
  </g>

  <!-- Right side: App mockup cards -->
  <g transform="translate(700, 120)">
    <!-- Prompt card 1 -->
    <g transform="rotate(-3)">
      <rect x="0" y="0" width="380" height="120" rx="16" fill="url(#cardGrad)" stroke="#2E2E3E" stroke-width="1"/>
      <rect x="16" y="16" width="44" height="44" rx="10" fill="#6C3CE9" opacity="0.2"/>
      <text x="38" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="22" text-anchor="middle" fill="#A78BFA">></text>
      <text x="76" y="36" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="15" fill="white">Code Review Expert</text>
      <text x="76" y="54" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="12" fill="#6B7280">Review {{language}} code for...</text>
      <rect x="76" y="70" width="70" height="22" rx="11" fill="#6C3CE9" opacity="0.15"/>
      <text x="111" y="85" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="10" fill="#A78BFA" text-anchor="middle">Development</text>
      <rect x="152" y="70" width="55" height="22" rx="11" fill="#6C3CE9" opacity="0.15"/>
      <text x="179" y="85" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="10" fill="#A78BFA" text-anchor="middle">Claude</text>
      <text x="340" y="36" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#6B7280">847 uses</text>
    </g>

    <!-- Prompt card 2 -->
    <g transform="translate(10, 135) rotate(1)">
      <rect x="0" y="0" width="380" height="120" rx="16" fill="url(#cardGrad)" stroke="#2E2E3E" stroke-width="1"/>
      <rect x="16" y="16" width="44" height="44" rx="10" fill="#F59E0B" opacity="0.2"/>
      <text x="38" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="20" text-anchor="middle" fill="#FCD34D">M</text>
      <text x="76" y="36" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="15" fill="white">Marketing Copy Writer</text>
      <text x="76" y="54" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="12" fill="#6B7280">Write {{tone}} copy for...</text>
      <rect x="76" y="70" width="60" height="22" rx="11" fill="#F59E0B" opacity="0.15"/>
      <text x="106" y="85" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="10" fill="#FCD34D" text-anchor="middle">Marketing</text>
      <rect x="142" y="70" width="60" height="22" rx="11" fill="#F59E0B" opacity="0.15"/>
      <text x="172" y="85" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="10" fill="#FCD34D" text-anchor="middle">ChatGPT</text>
      <text x="340" y="36" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#6B7280">1.2k uses</text>
    </g>

    <!-- Prompt card 3 -->
    <g transform="translate(5, 270) rotate(-1.5)">
      <rect x="0" y="0" width="380" height="120" rx="16" fill="url(#cardGrad)" stroke="#2E2E3E" stroke-width="1"/>
      <rect x="16" y="16" width="44" height="44" rx="10" fill="#10B981" opacity="0.2"/>
      <text x="38" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="20" text-anchor="middle" fill="#34D399">W</text>
      <text x="76" y="36" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="15" fill="white">3-Step Blog Workflow</text>
      <text x="76" y="54" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="12" fill="#6B7280">Research → Draft → Polish</text>
      <rect x="76" y="70" width="55" height="22" rx="11" fill="#10B981" opacity="0.15"/>
      <text x="103" y="85" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="10" fill="#34D399" text-anchor="middle">Workflow</text>
      <rect x="137" y="70" width="55" height="22" rx="11" fill="#10B981" opacity="0.15"/>
      <text x="164" y="85" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="10" fill="#34D399" text-anchor="middle">3 steps</text>
      <text x="340" y="36" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#6B7280">634 uses</text>
    </g>
  </g>

  <!-- NativeFirst logo -->
  <text x="80" y="590" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="14" fill="#6B7280">NativeFirst</text>
  <text x="1120" y="590" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="13" fill="#6B7280" text-anchor="end">nativefirstapp.com</text>
</svg>