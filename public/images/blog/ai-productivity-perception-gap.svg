<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">The METR Study: Vibes vs Reality</text>
  <text x="450" y="58" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="12">16 experienced developers, 246 real-world tasks, randomized controlled trial</text>

  <!-- Left side: What they expected -->
  <g transform="translate(130, 100)">
    <text x="100" y="0" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="13" font-weight="600">BEFORE THE STUDY</text>
    <text x="100" y="18" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">"How much faster will AI make you?"</text>

    <!-- Big number -->
    <text x="100" y="100" text-anchor="middle" fill="#22c55e" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" filter="url(#glow)">+24%</text>
    <text x="100" y="125" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="12" opacity="0.7">predicted speedup</text>

    <!-- Happy face -->
    <circle cx="100" cy="175" r="25" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.4"/>
    <circle cx="90" cy="170" r="3" fill="#22c55e" opacity="0.5"/>
    <circle cx="110" cy="170" r="3" fill="#22c55e" opacity="0.5"/>
    <path d="M 87,182 Q 100,195 113,182" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Center: Arrow or VS -->
  <g transform="translate(450, 200)">
    <text x="0" y="5" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="16" font-weight="700" opacity="0.6">vs</text>
  </g>

  <!-- Right side: What actually happened -->
  <g transform="translate(570, 100)">
    <text x="100" y="0" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="13" font-weight="600">ACTUAL RESULTS</text>
    <text x="100" y="18" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">Measured with objective data</text>

    <!-- Big number -->
    <text x="100" y="100" text-anchor="middle" fill="#ef4444" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" filter="url(#glow)">-19%</text>
    <text x="100" y="125" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="12" opacity="0.7">actually slower</text>

    <!-- Shocked face -->
    <circle cx="100" cy="175" r="25" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.4"/>
    <circle cx="90" cy="168" r="4" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
    <circle cx="110" cy="168" r="4" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
    <ellipse cx="100" cy="186" rx="8" ry="6" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Bottom: The kicker -->
  <g transform="translate(450, 310)">
    <rect x="-350" y="-15" width="700" height="55" rx="8" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="1" opacity="0.2"/>
    <text x="0" y="5" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="13" font-weight="600">The kicker: AFTER the study, they still estimated AI made them 20% faster.</text>
    <text x="0" y="25" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="12">The vibes were so good they couldn't feel reality.</text>
  </g>

  <!-- Source -->
  <text x="450" y="385" text-anchor="middle" fill="#4b5563" font-family="monospace" font-size="10">Source: METR Randomized Controlled Trial, July 2025</text>
</svg>