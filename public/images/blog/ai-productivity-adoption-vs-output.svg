<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" width="900" height="450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="450" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">The Gap Nobody Talks About</text>
  <text x="450" y="62" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="12">AI Adoption vs Actual Productivity Gain (2023-2026)</text>

  <!-- Y axis -->
  <line x1="80" y1="90" x2="80" y2="370" stroke="#374151" stroke-width="1"/>
  <text x="70" y="95" text-anchor="end" fill="#6b7280" font-family="monospace" font-size="10">100%</text>
  <text x="70" y="165" text-anchor="end" fill="#6b7280" font-family="monospace" font-size="10">75%</text>
  <text x="70" y="235" text-anchor="end" fill="#6b7280" font-family="monospace" font-size="10">50%</text>
  <text x="70" y="305" text-anchor="end" fill="#6b7280" font-family="monospace" font-size="10">25%</text>
  <text x="70" y="375" text-anchor="end" fill="#6b7280" font-family="monospace" font-size="10">0%</text>

  <!-- X axis -->
  <line x1="80" y1="370" x2="840" y2="370" stroke="#374151" stroke-width="1"/>
  <text x="210" y="395" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="11">2023</text>
  <text x="400" y="395" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="11">2024</text>
  <text x="590" y="395" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="11">2025</text>
  <text x="780" y="395" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="11">2026</text>

  <!-- Grid lines -->
  <g opacity="0.08" stroke="#6b7280">
    <line x1="80" y1="160" x2="840" y2="160" stroke-dasharray="4 4"/>
    <line x1="80" y1="230" x2="840" y2="230" stroke-dasharray="4 4"/>
    <line x1="80" y1="300" x2="840" y2="300" stroke-dasharray="4 4"/>
  </g>

  <!-- Adoption line (green, going UP steeply) -->
  <polyline points="120,340 210,300 310,260 400,210 500,160 590,120 690,105 780,98"
    fill="none" stroke="#22c55e" stroke-width="3" filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Adoption data points -->
  <circle cx="210" cy="300" r="4" fill="#22c55e" filter="url(#glow)"/>
  <circle cx="400" cy="210" r="4" fill="#22c55e" filter="url(#glow)"/>
  <circle cx="590" cy="120" r="4" fill="#22c55e" filter="url(#glow)"/>
  <circle cx="780" cy="98" r="5" fill="#22c55e" filter="url(#glow)"/>
  <!-- Adoption label -->
  <text x="790" y="93" fill="#22c55e" font-family="monospace" font-size="11" font-weight="700">92.6%</text>
  <text x="120" y="335" fill="#22c55e" font-family="monospace" font-size="10" opacity="0.8">AI Adoption</text>

  <!-- AI-authored code line (cyan, rising) -->
  <polyline points="120,365 210,355 310,345 400,330 500,310 590,290 690,280 780,270"
    fill="none" stroke="#06b6d4" stroke-width="2.5" filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 4"/>
  <circle cx="780" cy="270" r="4" fill="#06b6d4" filter="url(#glow)"/>
  <text x="790" y="275" fill="#06b6d4" font-family="monospace" font-size="11" font-weight="700">26.9%</text>
  <text x="120" y="360" fill="#06b6d4" font-family="monospace" font-size="10" opacity="0.8">AI-Authored Code</text>

  <!-- Productivity line (red/amber, FLAT) -->
  <polyline points="120,365 210,360 310,348 400,342 500,340 590,342 690,340 780,342"
    fill="none" stroke="#f59e0b" stroke-width="3" filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="400" cy="342" r="4" fill="#f59e0b" filter="url(#glow)"/>
  <circle cx="590" cy="342" r="4" fill="#f59e0b" filter="url(#glow)"/>
  <circle cx="780" cy="342" r="5" fill="#f59e0b" filter="url(#glow)"/>
  <text x="790" y="347" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="700">~10%</text>
  <text x="475" y="330" fill="#f59e0b" font-family="monospace" font-size="10" opacity="0.8">Actual Productivity</text>

  <!-- Annotation: the gap -->
  <line x1="760" y1="105" x2="760" y2="335" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <text x="745" y="220" text-anchor="end" fill="#ef4444" font-family="system-ui, sans-serif" font-size="13" font-weight="700" opacity="0.7">THE GAP</text>

  <!-- Legend -->
  <g transform="translate(450, 425)">
    <circle cx="-180" cy="-5" r="4" fill="#22c55e"/>
    <text x="-170" y="0" fill="#9ca3af" font-family="monospace" font-size="10">Adoption</text>
    <circle cx="-80" cy="-5" r="4" fill="#06b6d4"/>
    <text x="-70" y="0" fill="#9ca3af" font-family="monospace" font-size="10">AI Code %</text>
    <circle cx="20" cy="-5" r="4" fill="#f59e0b"/>
    <text x="30" y="0" fill="#9ca3af" font-family="monospace" font-size="10">Productivity</text>
  </g>
</svg>