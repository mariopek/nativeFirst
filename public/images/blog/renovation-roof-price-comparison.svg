<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="300" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="19" font-weight="bold" fill="#f8fafc">Same Roof. Ten Times the Price.</text>
  <line x1="280" y1="50" x2="520" y2="50" stroke="#f97316" stroke-width="2" opacity="0.6"/>

  <!-- Big company card -->
  <g transform="translate(60, 70)" font-family="system-ui, -apple-system, sans-serif" filter="url(#shadow)">
    <rect x="0" y="0" width="310" height="170" rx="14" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
    <text x="155" y="32" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef4444">Professional Company</text>
    <line x1="20" y1="44" x2="290" y2="44" stroke="#334155" stroke-width="1"/>
    <text x="155" y="80" text-anchor="middle" font-size="40" font-weight="bold" fill="#ef4444">$40,000</text>
    <text x="155" y="110" text-anchor="middle" font-size="12" fill="#94a3b8">2-hour sales presentation</text>
    <text x="155" y="128" text-anchor="middle" font-size="12" fill="#94a3b8">"Sign today" high-pressure pitch</text>
    <text x="155" y="146" text-anchor="middle" font-size="12" fill="#94a3b8">Called for months after rejection</text>
    <text x="155" y="164" text-anchor="middle" font-size="11" fill="#64748b">Big marketing budget = big overhead</text>
  </g>

  <!-- VS -->
  <g transform="translate(385, 140)">
    <circle cx="15" cy="15" r="22" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
    <text x="15" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#f97316">VS</text>
  </g>

  <!-- Small crew card -->
  <g transform="translate(430, 70)" font-family="system-ui, -apple-system, sans-serif" filter="url(#shadow)">
    <rect x="0" y="0" width="310" height="170" rx="14" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
    <text x="155" y="32" text-anchor="middle" font-size="14" font-weight="bold" fill="#22c55e">Small Local Crew</text>
    <line x1="20" y1="44" x2="290" y2="44" stroke="#334155" stroke-width="1"/>
    <text x="155" y="80" text-anchor="middle" font-size="40" font-weight="bold" fill="#22c55e">$4,000</text>
    <text x="155" y="110" text-anchor="middle" font-size="12" fill="#94a3b8">Installed in 2 days</text>
    <text x="155" y="128" text-anchor="middle" font-size="12" fill="#94a3b8">Same metal roof, same house</text>
    <text x="155" y="146" text-anchor="middle" font-size="12" fill="#94a3b8">Minimal overhead, just skilled work</text>
    <text x="155" y="164" text-anchor="middle" font-size="11" fill="#22c55e" font-weight="600">10x less for the same result</text>
  </g>

  <!-- Bottom callout -->
  <g transform="translate(60, 258)" font-family="system-ui, -apple-system, sans-serif">
    <rect x="0" y="0" width="680" height="30" rx="8" fill="#f97316" opacity="0.1"/>
    <text x="340" y="20" text-anchor="middle" font-size="13" fill="#f97316">Marketing budget and company size have almost no correlation with pricing fairness.</text>
  </g>
</svg>
