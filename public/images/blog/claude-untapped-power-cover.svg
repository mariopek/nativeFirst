<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0f1129"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#eab308"/>
    </linearGradient>
    <linearGradient id="claude" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="100%" style="stop-color:#c2956a"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#d4a574;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Central glow -->
  <circle cx="600" cy="280" r="200" fill="url(#glow)"/>

  <!-- Connection lines from center to nodes -->
  <g stroke="#d4a574" stroke-width="1" opacity="0.15">
    <line x1="600" y1="280" x2="160" y2="140"/>
    <line x1="600" y1="280" x2="1040" y2="140"/>
    <line x1="600" y1="280" x2="160" y2="480"/>
    <line x1="600" y1="280" x2="1040" y2="480"/>
    <line x1="600" y1="280" x2="600" y2="100"/>
    <line x1="600" y1="280" x2="300" y2="300"/>
    <line x1="600" y1="280" x2="900" y2="300"/>
  </g>

  <!-- Automation nodes -->
  <!-- n8n -->
  <g transform="translate(100, 110)">
    <rect width="120" height="55" rx="12" fill="#1a1a2e" stroke="#ea4b71" stroke-width="1.5" opacity="0.9"/>
    <text x="60" y="24" font-family="system-ui, sans-serif" font-weight="700" font-size="14" fill="#ea4b71" text-anchor="middle">n8n</text>
    <text x="60" y="42" font-family="system-ui, sans-serif" font-size="10" fill="#777" text-anchor="middle">Workflows</text>
  </g>

  <!-- Zapier -->
  <g transform="translate(980, 110)">
    <rect width="120" height="55" rx="12" fill="#1a1a2e" stroke="#ff4a00" stroke-width="1.5" opacity="0.9"/>
    <text x="60" y="24" font-family="system-ui, sans-serif" font-weight="700" font-size="14" fill="#ff4a00" text-anchor="middle">Zapier</text>
    <text x="60" y="42" font-family="system-ui, sans-serif" font-size="10" fill="#777" text-anchor="middle">8000+ Tools</text>
  </g>

  <!-- Slack -->
  <g transform="translate(240, 275)">
    <rect width="110" height="50" rx="12" fill="#1a1a2e" stroke="#4a154b" stroke-width="1.5" opacity="0.9"/>
    <text x="55" y="24" font-family="system-ui, sans-serif" font-weight="700" font-size="14" fill="#e01e5a" text-anchor="middle">Slack</text>
    <text x="55" y="40" font-family="system-ui, sans-serif" font-size="10" fill="#777" text-anchor="middle">Notifications</text>
  </g>

  <!-- MCP -->
  <g transform="translate(540, 70)">
    <rect width="120" height="55" rx="12" fill="#1a1a2e" stroke="#06b6d4" stroke-width="1.5" opacity="0.9"/>
    <text x="60" y="24" font-family="system-ui, sans-serif" font-weight="700" font-size="14" fill="#06b6d4" text-anchor="middle">MCP</text>
    <text x="60" y="42" font-family="system-ui, sans-serif" font-size="10" fill="#777" text-anchor="middle">Servers</text>
  </g>

  <!-- GitHub -->
  <g transform="translate(850, 275)">
    <rect width="110" height="50" rx="12" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5" opacity="0.9"/>
    <text x="55" y="24" font-family="system-ui, sans-serif" font-weight="700" font-size="14" fill="#8b5cf6" text-anchor="middle">GitHub</text>
    <text x="55" y="40" font-family="system-ui, sans-serif" font-size="10" fill="#777" text-anchor="middle">Code + CI/CD</text>
  </g>

  <!-- CRM -->
  <g transform="translate(100, 455)">
    <rect width="120" height="55" rx="12" fill="#1a1a2e" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
    <text x="60" y="24" font-family="system-ui, sans-serif" font-weight="700" font-size="14" fill="#10b981" text-anchor="middle">CRM</text>
    <text x="60" y="42" font-family="system-ui, sans-serif" font-size="10" fill="#777" text-anchor="middle">HubSpot / Coda</text>
  </g>

  <!-- Marketing -->
  <g transform="translate(980, 455)">
    <rect width="120" height="55" rx="12" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <text x="60" y="24" font-family="system-ui, sans-serif" font-weight="700" font-size="14" fill="#f59e0b" text-anchor="middle">Marketing</text>
    <text x="60" y="42" font-family="system-ui, sans-serif" font-size="10" fill="#777" text-anchor="middle">Content + SEO</text>
  </g>

  <!-- Central Claude node -->
  <g transform="translate(520, 230)">
    <rect width="160" height="100" rx="20" fill="#1a1a2e" stroke="url(#claude)" stroke-width="2.5"/>
    <text x="80" y="42" font-family="system-ui, sans-serif" font-weight="900" font-size="22" fill="#d4a574" text-anchor="middle">Claude</text>
    <text x="80" y="68" font-family="system-ui, sans-serif" font-weight="500" font-size="13" fill="#999" text-anchor="middle">The Brain</text>
    <text x="80" y="86" font-family="system-ui, sans-serif" font-size="10" fill="#666" text-anchor="middle">$0 → $2.5B in 9 months</text>
  </g>

  <!-- Title -->
  <text x="600" y="420" font-family="system-ui, sans-serif" font-weight="900" font-size="38" fill="url(#accent)" text-anchor="middle" letter-spacing="-0.5">
    The Untapped Power of Claude
  </text>
  <text x="600" y="465" font-family="system-ui, sans-serif" font-weight="600" font-size="22" fill="#ccc" text-anchor="middle">
    One Person. One Terminal. Entire Departments.
  </text>
  <text x="600" y="500" font-family="system-ui, sans-serif" font-size="15" fill="#777" text-anchor="middle">
    Automations, setups, and stories the internet can't stop talking about
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)" opacity="0.5"/>
</svg>