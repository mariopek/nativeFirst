<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f1a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a20;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fadeGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="muscleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Background orbs -->
  <circle cx="200" cy="180" r="150" fill="#a855f7" opacity="0.05" filter="url(#bigGlow)"/>
  <circle cx="1000" cy="450" r="170" fill="#ef4444" opacity="0.04" filter="url(#bigGlow)"/>
  <circle cx="600" cy="315" r="120" fill="#6366f1" opacity="0.04" filter="url(#bigGlow)"/>

  <!-- Brain outline (left side) - full, solid -->
  <g transform="translate(140, 140)" opacity="0.85">
    <path d="M120 20 C80 20, 30 50, 25 100 C20 140, 40 170, 55 185 C45 200, 40 225, 55 250 C65 270, 90 280, 110 280 C125 285, 140 280, 155 275 C170 280, 190 285, 205 275 C225 265, 240 240, 235 215 C250 200, 260 175, 250 150 C260 130, 255 100, 235 75 C215 50, 175 20, 140 20 Z"
          fill="none" stroke="#a855f7" stroke-width="2" filter="url(#glow)"/>
    <!-- Brain folds -->
    <path d="M70 100 C90 95, 110 105, 130 95 C150 85, 160 100, 175 95" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
    <path d="M60 140 C85 135, 100 150, 125 140 C145 132, 165 145, 185 138" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
    <path d="M65 180 C90 175, 105 190, 130 182 C150 175, 170 185, 195 178" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
    <path d="M80 220 C100 215, 115 225, 140 218 C160 212, 175 222, 190 215" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
    <!-- Center line -->
    <path d="M130 25 C135 80, 125 160, 135 275" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Brain outline (right side) - fading, dissolving -->
  <g transform="translate(780, 140)" opacity="0.35">
    <path d="M120 20 C80 20, 30 50, 25 100 C20 140, 40 170, 55 185 C45 200, 40 225, 55 250 C65 270, 90 280, 110 280 C125 285, 140 280, 155 275 C170 280, 190 285, 205 275 C225 265, 240 240, 235 215 C250 200, 260 175, 250 150 C260 130, 255 100, 235 75 C215 50, 175 20, 140 20 Z"
          fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="8 6" filter="url(#glow)"/>
    <!-- Fading brain folds -->
    <path d="M70 100 C90 95, 110 105, 130 95 C150 85, 160 100, 175 95" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.3" stroke-dasharray="4 8"/>
    <path d="M60 140 C85 135, 100 150, 125 140 C145 132, 165 145, 185 138" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.25" stroke-dasharray="5 10"/>
    <path d="M65 180 C90 175, 105 190, 130 182 C150 175, 170 185, 195 178" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.2" stroke-dasharray="3 12"/>
    <path d="M80 220 C100 215, 115 225, 140 218 C160 212, 175 222, 190 215" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.15" stroke-dasharray="2 15"/>
  </g>

  <!-- Dissolving particles from right brain -->
  <g opacity="0.5">
    <circle cx="1020" cy="200" r="3" fill="#ef4444" opacity="0.6"/>
    <circle cx="1050" cy="230" r="2" fill="#ef4444" opacity="0.4"/>
    <circle cx="1035" cy="180" r="2.5" fill="#ef4444" opacity="0.5"/>
    <circle cx="1060" cy="260" r="1.5" fill="#ef4444" opacity="0.3"/>
    <circle cx="1080" cy="210" r="2" fill="#ef4444" opacity="0.25"/>
    <circle cx="1045" cy="300" r="1.5" fill="#ef4444" opacity="0.2"/>
    <circle cx="1070" cy="170" r="2" fill="#ef4444" opacity="0.35"/>
    <circle cx="1090" cy="250" r="1" fill="#ef4444" opacity="0.15"/>
    <circle cx="1030" cy="340" r="2" fill="#ef4444" opacity="0.2"/>
    <circle cx="1065" cy="150" r="1.5" fill="#ef4444" opacity="0.3"/>
    <circle cx="1100" cy="290" r="1.5" fill="#ef4444" opacity="0.1"/>
  </g>

  <!-- Arrow between brains -->
  <g transform="translate(480, 280)">
    <line x1="0" y1="0" x2="230" y2="0" stroke="#6366f1" stroke-width="2" opacity="0.4" stroke-dasharray="6 4"/>
    <polygon points="235,0 220,-8 220,8" fill="#6366f1" opacity="0.4"/>
    <!-- Label -->
    <text x="115" y="-15" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="11" opacity="0.5">4 months</text>
  </g>

  <!-- Code symbols floating away (top area) -->
  <g opacity="0.15" fill="#a855f7" font-family="monospace" font-size="14">
    <text x="350" y="80" transform="rotate(-15 350 80)">function()</text>
    <text x="550" y="50" transform="rotate(10 550 50)">const x =</text>
    <text x="750" y="70" transform="rotate(-5 750 70)">return</text>
    <text x="450" y="110" transform="rotate(8 450 110)">async</text>
    <text x="650" y="90" transform="rotate(-12 650 90)">await</text>
    <text x="850" y="100" transform="rotate(6 850 100)">class</text>
    <text x="200" y="530" transform="rotate(5 200 530)">import</text>
    <text x="400" y="560" transform="rotate(-8 400 560)">export</text>
    <text x="800" y="550" transform="rotate(3 800 550)">try/catch</text>
    <text x="1000" y="530" transform="rotate(-6 1000 530)">interface</text>
  </g>

  <!-- Prompt counter (center) -->
  <g transform="translate(600, 480)">
    <rect x="-140" y="-25" width="280" height="50" rx="25" fill="#0f0a1a" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
    <text x="0" y="7" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="18" font-weight="bold" filter="url(#glow)">
      prompts: 10,247 | skills: --
    </text>
  </g>

  <!-- Labels under brains -->
  <text x="270" y="460" text-anchor="middle" fill="#a855f7" font-family="sans-serif" font-size="16" font-weight="bold" opacity="0.7" filter="url(#glow)">BEFORE</text>
  <text x="910" y="460" text-anchor="middle" fill="#ef4444" font-family="sans-serif" font-size="16" font-weight="bold" opacity="0.7" filter="url(#glow)">AFTER</text>

  <!-- Stat badges -->
  <g transform="translate(100, 530)">
    <rect x="0" y="0" width="180" height="32" rx="16" fill="#ef4444" opacity="0.15"/>
    <text x="90" y="21" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="13" opacity="0.8">35 CVEs in March</text>
  </g>
  <g transform="translate(920, 530)">
    <rect x="0" y="0" width="200" height="32" rx="16" fill="#ef4444" opacity="0.15"/>
    <text x="100" y="21" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="13" opacity="0.8">1.5M keys leaked</text>
  </g>
</svg>