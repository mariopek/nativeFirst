<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1a1033"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="termGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#c2956b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <line x1="100" y1="0" x2="100" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#94a3b8" stroke-width="1"/>
  </g>

  <!-- Terminal window -->
  <g transform="translate(100, 60)">
    <rect x="0" y="0" width="1000" height="400" rx="12" fill="#1a1a2e" stroke="#d4a574" stroke-width="1.5" opacity="0.95"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="1000" height="36" rx="12" fill="#252540"/>
    <rect x="0" y="24" width="1000" height="12" fill="#252540"/>
    <circle cx="22" cy="18" r="7" fill="#ef4444"/>
    <circle cx="44" cy="18" r="7" fill="#fbbf24"/>
    <circle cx="66" cy="18" r="7" fill="#22c55e"/>
    <text x="500" y="22" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="13">claude — 12 commands that actually matter</text>

    <!-- Command lines -->
    <text x="20" y="65" fill="#d4a574" font-family="monospace" font-size="14" font-weight="bold">$</text>
    <text x="35" y="65" fill="#e2e8f0" font-family="monospace" font-size="14"> claude /init</text>
    <text x="240" y="65" fill="#6b7280" font-family="monospace" font-size="12">← your project's brain</text>

    <text x="20" y="92" fill="#d4a574" font-family="monospace" font-size="14" font-weight="bold">$</text>
    <text x="35" y="92" fill="#e2e8f0" font-family="monospace" font-size="14"> claude /project:review $ARGUMENTS</text>
    <text x="490" y="92" fill="#6b7280" font-family="monospace" font-size="12">← custom slash commands</text>

    <text x="20" y="119" fill="#d4a574" font-family="monospace" font-size="14" font-weight="bold">$</text>
    <text x="35" y="119" fill="#e2e8f0" font-family="monospace" font-size="14"> claude --worktree feature-auth</text>
    <text x="460" y="119" fill="#6b7280" font-family="monospace" font-size="12">← parallel sessions</text>

    <text x="20" y="146" fill="#d4a574" font-family="monospace" font-size="14" font-weight="bold">$</text>
    <text x="35" y="146" fill="#e2e8f0" font-family="monospace" font-size="14"> claude "run tests, fix failures, repeat"</text>
    <text x="530" y="146" fill="#6b7280" font-family="monospace" font-size="12">← autonomous loops</text>

    <!-- Hooks config preview -->
    <text x="20" y="185" fill="#7c3aed" font-family="monospace" font-size="13">// .claude/settings.json</text>
    <text x="20" y="208" fill="#60a5fa" font-family="monospace" font-size="13">"hooks": {"{"}</text>
    <text x="20" y="231" fill="#60a5fa" font-family="monospace" font-size="13">  "PreToolUse":  [block .env writes]</text>
    <text x="20" y="254" fill="#60a5fa" font-family="monospace" font-size="13">  "PostToolUse": [auto-format on save]</text>
    <text x="20" y="277" fill="#60a5fa" font-family="monospace" font-size="13">  "Stop":        [notify when done]</text>
    <text x="20" y="300" fill="#60a5fa" font-family="monospace" font-size="13">{"}"}</text>

    <!-- Stats bar -->
    <rect x="20" y="325" width="960" height="50" rx="8" fill="#22c55e" opacity="0.1"/>
    <text x="40" y="355" fill="#4ade80" font-family="monospace" font-size="14">✓ 62% fewer bugs</text>
    <text x="270" y="355" fill="#4ade80" font-family="monospace" font-size="14">✓ 58% faster reviews</text>
    <text x="530" y="355" fill="#4ade80" font-family="monospace" font-size="14">✓ 0 merge conflicts</text>
    <text x="770" y="355" fill="#4ade80" font-family="monospace" font-size="14">✓ 3x output</text>
  </g>

  <!-- Title -->
  <text x="600" y="520" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-weight="bold" font-size="34">
    12 Claude Code Commands I Actually Use Every Day
  </text>
  <text x="600" y="556" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="19">
    Custom Slash Commands, Hooks, Worktrees, and the Stuff Nobody Tells You
  </text>

  <!-- Branding -->
  <text x="600" y="605" text-anchor="middle" fill="#d4a574" font-family="Arial, sans-serif" font-weight="bold" font-size="15">nativefirstapp.com</text>
</svg>