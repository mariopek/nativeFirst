<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a1e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="meterFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.8" />
      <stop offset="40%" style="stop-color:#f59e0b;stop-opacity:0.8" />
      <stop offset="75%" style="stop-color:#ef4444;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#ef4444" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Floating orbs -->
  <circle cx="900" cy="180" r="160" fill="#ef4444" opacity="0.06" filter="url(#bigGlow)"/>
  <circle cx="200" cy="400" r="120" fill="#f59e0b" opacity="0.05" filter="url(#bigGlow)"/>

  <!-- Giant dollar amount -->
  <g transform="translate(680, 100)">
    <text x="0" y="0" fill="#ef4444" font-family="monospace" font-size="180" font-weight="900" opacity="0.08" filter="url(#softGlow)">$2,400</text>
  </g>

  <!-- Credit meter / gauge -->
  <g transform="translate(850, 280)">
    <!-- Meter arc background -->
    <path d="M -120,0 A 120,120 0 0,1 120,0" fill="none" stroke="#374151" stroke-width="16" opacity="0.3" stroke-linecap="round"/>
    <!-- Meter fill (green to red) -->
    <path d="M -120,0 A 120,120 0 0,1 108,-52" fill="none" stroke="url(#meterFill)" stroke-width="16" opacity="0.7" stroke-linecap="round" filter="url(#glow)"/>
    <!-- Needle pointing to max/red -->
    <line x1="0" y1="0" x2="96" y2="-72" stroke="#ef4444" stroke-width="4" opacity="0.9" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="10" fill="#ef4444" opacity="0.9" filter="url(#glow)"/>
    <!-- Tick marks -->
    <text x="-135" y="30" fill="#22c55e" font-family="monospace" font-size="11" opacity="0.5">$0</text>
    <text x="0" y="-130" fill="#f59e0b" font-family="monospace" font-size="11" opacity="0.5" text-anchor="middle">$500</text>
    <text x="120" y="30" fill="#ef4444" font-family="monospace" font-size="11" opacity="0.7">MAX</text>
    <!-- Label -->
    <text x="0" y="55" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="12" opacity="0.8" filter="url(#glow)">API CREDITS BURNED</text>
  </g>

  <!-- Scrolling cost ticker -->
  <g opacity="0.12" font-family="monospace" font-size="11">
    <text x="50" y="60" fill="#ef4444">03:14 AM  claude-api  $12.40  (iteration 23/47)</text>
    <text x="50" y="80" fill="#ef4444">03:15 AM  claude-api  $14.20  (iteration 24/47)</text>
    <text x="50" y="100" fill="#f59e0b">03:16 AM  claude-api  $15.80  (iteration 25/47)</text>
    <text x="50" y="120" fill="#ef4444">03:17 AM  claude-api  $17.60  (refactoring...)</text>
    <text x="50" y="140" fill="#ef4444">03:18 AM  claude-api  $19.40  (refactoring...)</text>
    <text x="50" y="160" fill="#dc2626">03:19 AM  claude-api  $21.20  (creating files...)</text>
    <text x="50" y="180" fill="#dc2626">03:20 AM  claude-api  $23.00  (deleting files...)</text>
    <text x="50" y="200" fill="#dc2626">03:21 AM  WARNING: budget threshold exceeded</text>
  </g>

  <!-- Cost comparison floating stats -->
  <g opacity="0.15" font-family="monospace" font-size="11">
    <text x="700" y="480" fill="#f59e0b">bug fix value:    $0.50</text>
    <text x="700" y="500" fill="#ef4444">actual cost:     $30.00  (47 iterations)</text>
    <text x="700" y="520" fill="#dc2626">overnight bill:  $2,400  (agent loop)</text>
    <text x="700" y="540" fill="#ef4444">monthly avg:     $500-2,000</text>
  </g>

  <!-- Rising cost graph -->
  <g transform="translate(420, 150)" opacity="0.18">
    <polyline points="0,120 20,118 40,115 60,110 80,100 100,85 120,65 140,40 160,10 180,-20 200,-60" fill="none" stroke="#ef4444" stroke-width="2" filter="url(#glow)"/>
    <text x="210" y="-55" font-family="monospace" font-size="9" fill="#ef4444">cost</text>
    <polyline points="0,100 20,100 40,101 60,100 80,100 100,101 120,100 140,100 160,101 180,100 200,100" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
    <text x="210" y="104" font-family="monospace" font-size="9" fill="#22c55e" opacity="0.5">value</text>
  </g>

  <!-- Title -->
  <text x="80" y="420" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="800" letter-spacing="-1">Your AI Coding Tool Spent</text>
  <text x="80" y="472" fill="url(#redGlow)" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" filter="url(#glow)" letter-spacing="-1">$2,400</text>
  <text x="295" y="472" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="800" letter-spacing="-1"> While You Slept</text>
  <text x="80" y="520" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="500">The AI pricing trap nobody budgeted for.</text>

  <!-- NativeFirst badge -->
  <text x="1120" y="610" text-anchor="end" fill="#4b5563" font-family="system-ui" font-size="12">nativefirst.dev</text>

  <!-- Ambient particles -->
  <circle cx="300" cy="500" r="1.5" fill="#ef4444" opacity="0.4"/>
  <circle cx="1000" cy="150" r="1" fill="#f59e0b" opacity="0.3"/>
  <circle cx="550" cy="300" r="1.5" fill="#ef4444" opacity="0.2"/>
  <circle cx="1100" cy="350" r="1" fill="#dc2626" opacity="0.3"/>
  <circle cx="150" cy="280" r="1" fill="#f59e0b" opacity="0.25"/>
</svg>
