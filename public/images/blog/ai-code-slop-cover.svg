<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0f0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="prGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.7" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#f59e0b" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Ambient glow spots -->
  <circle cx="300" cy="315" r="200" fill="#f59e0b" opacity="0.04" filter="url(#bigGlow)"/>
  <circle cx="900" cy="315" r="200" fill="#ef4444" opacity="0.04" filter="url(#bigGlow)"/>

  <!-- LEFT SIDE: Stack of PR notification cards (overflowing inbox) -->

  <!-- PR Card 1 (bottom, tilted) -->
  <g transform="translate(80, 180) rotate(-3)">
    <rect x="0" y="0" width="320" height="60" rx="8" fill="#1a1a2e" stroke="#ef4444" stroke-width="1" opacity="0.7"/>
    <circle cx="24" cy="30" r="8" fill="#ef4444" opacity="0.6"/>
    <rect x="44" y="16" width="160" height="10" rx="3" fill="#334155" opacity="0.8"/>
    <rect x="44" y="34" width="100" height="8" rx="3" fill="#1e293b" opacity="0.8"/>
    <text x="260" y="35" font-family="monospace" font-size="11" fill="#ef4444" opacity="0.7">+847</text>
  </g>

  <!-- PR Card 2 -->
  <g transform="translate(90, 240) rotate(1)">
    <rect x="0" y="0" width="320" height="60" rx="8" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
    <circle cx="24" cy="30" r="8" fill="#f59e0b" opacity="0.6"/>
    <rect x="44" y="16" width="180" height="10" rx="3" fill="#334155" opacity="0.8"/>
    <rect x="44" y="34" width="120" height="8" rx="3" fill="#1e293b" opacity="0.8"/>
    <text x="260" y="35" font-family="monospace" font-size="11" fill="#f59e0b" opacity="0.7">+1.2k</text>
  </g>

  <!-- PR Card 3 -->
  <g transform="translate(85, 300) rotate(-1.5)">
    <rect x="0" y="0" width="320" height="60" rx="8" fill="#1a1a2e" stroke="#ef4444" stroke-width="1" opacity="0.85"/>
    <circle cx="24" cy="30" r="8" fill="#ef4444" opacity="0.6"/>
    <rect x="44" y="16" width="140" height="10" rx="3" fill="#334155" opacity="0.8"/>
    <rect x="44" y="34" width="90" height="8" rx="3" fill="#1e293b" opacity="0.8"/>
    <text x="260" y="35" font-family="monospace" font-size="11" fill="#ef4444" opacity="0.7">+623</text>
  </g>

  <!-- PR Card 4 (prominent) -->
  <g transform="translate(95, 360) rotate(0.5)">
    <rect x="0" y="0" width="320" height="60" rx="8" fill="#1a1a2e" stroke="#f97316" stroke-width="1.5" opacity="0.9"/>
    <circle cx="24" cy="30" r="8" fill="#f97316" opacity="0.7"/>
    <rect x="44" y="16" width="200" height="10" rx="3" fill="#334155" opacity="0.8"/>
    <rect x="44" y="34" width="80" height="8" rx="3" fill="#1e293b" opacity="0.8"/>
    <text x="260" y="35" font-family="monospace" font-size="11" fill="#f97316" opacity="0.8">+2.1k</text>
  </g>

  <!-- PR Card 5 (top) -->
  <g transform="translate(88, 420) rotate(-0.8)">
    <rect x="0" y="0" width="320" height="60" rx="8" fill="#1a1a2e" stroke="#ef4444" stroke-width="1" opacity="0.75"/>
    <circle cx="24" cy="30" r="8" fill="#ef4444" opacity="0.5"/>
    <rect x="44" y="16" width="170" height="10" rx="3" fill="#334155" opacity="0.8"/>
    <rect x="44" y="34" width="110" height="8" rx="3" fill="#1e293b" opacity="0.8"/>
    <text x="260" y="35" font-family="monospace" font-size="11" fill="#ef4444" opacity="0.6">+956</text>
  </g>

  <!-- Notification badge on stack -->
  <circle cx="420" cy="190" r="22" fill="#ef4444" filter="url(#glow)"/>
  <text x="420" y="196" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">30</text>

  <!-- RIGHT SIDE: Single reviewer figure (exhausted) -->

  <!-- Monitor/Screen -->
  <g transform="translate(700, 200)">
    <!-- Screen frame -->
    <rect x="0" y="0" width="340" height="220" rx="12" fill="#0f172a" stroke="#334155" stroke-width="2"/>

    <!-- Screen content: code lines (messy) -->
    <rect x="20" y="20" width="120" height="8" rx="2" fill="#ef4444" opacity="0.4"/>
    <rect x="20" y="36" width="200" height="8" rx="2" fill="#64748b" opacity="0.3"/>
    <rect x="20" y="52" width="80" height="8" rx="2" fill="#f59e0b" opacity="0.4"/>
    <rect x="20" y="68" width="260" height="8" rx="2" fill="#64748b" opacity="0.3"/>
    <rect x="20" y="84" width="160" height="8" rx="2" fill="#64748b" opacity="0.3"/>
    <rect x="20" y="100" width="100" height="8" rx="2" fill="#ef4444" opacity="0.4"/>
    <rect x="20" y="116" width="220" height="8" rx="2" fill="#64748b" opacity="0.3"/>
    <rect x="20" y="132" width="140" height="8" rx="2" fill="#f59e0b" opacity="0.4"/>
    <rect x="20" y="148" width="180" height="8" rx="2" fill="#64748b" opacity="0.3"/>
    <rect x="20" y="164" width="90" height="8" rx="2" fill="#ef4444" opacity="0.5"/>
    <rect x="20" y="180" width="240" height="8" rx="2" fill="#64748b" opacity="0.3"/>

    <!-- Warning icons on screen -->
    <g transform="translate(280, 20)" filter="url(#glow)">
      <polygon points="10,0 20,18 0,18" fill="#f59e0b" opacity="0.8"/>
      <text x="10" y="15" font-family="system-ui" font-size="11" fill="#1a1a2e" text-anchor="middle" font-weight="bold">!</text>
    </g>
    <g transform="translate(280, 50)" filter="url(#glow)">
      <polygon points="10,0 20,18 0,18" fill="#ef4444" opacity="0.8"/>
      <text x="10" y="15" font-family="system-ui" font-size="11" fill="#1a1a2e" text-anchor="middle" font-weight="bold">!</text>
    </g>
    <g transform="translate(280, 100)" filter="url(#glow)">
      <polygon points="10,0 20,18 0,18" fill="#ef4444" opacity="0.7"/>
      <text x="10" y="15" font-family="system-ui" font-size="11" fill="#1a1a2e" text-anchor="middle" font-weight="bold">!</text>
    </g>
    <g transform="translate(280, 160)" filter="url(#glow)">
      <polygon points="10,0 20,18 0,18" fill="#f59e0b" opacity="0.7"/>
      <text x="10" y="15" font-family="system-ui" font-size="11" fill="#1a1a2e" text-anchor="middle" font-weight="bold">!</text>
    </g>

    <!-- Monitor stand -->
    <rect x="140" y="220" width="60" height="12" rx="2" fill="#334155"/>
    <rect x="120" y="232" width="100" height="6" rx="3" fill="#334155"/>
  </g>

  <!-- Person silhouette (head in hands pose) -->
  <g transform="translate(820, 440)">
    <!-- Desk surface -->
    <rect x="-120" y="30" width="280" height="4" rx="2" fill="#334155" opacity="0.6"/>

    <!-- Arms on desk -->
    <ellipse cx="-30" cy="20" rx="40" ry="12" fill="#475569" opacity="0.5"/>
    <ellipse cx="70" cy="20" rx="40" ry="12" fill="#475569" opacity="0.5"/>

    <!-- Head (slumped) -->
    <circle cx="20" cy="-5" r="28" fill="#64748b" opacity="0.6"/>

    <!-- Coffee cup -->
    <rect x="130" y="5" width="16" height="22" rx="3" fill="#334155" opacity="0.5"/>
    <rect x="146" y="10" width="8" height="10" rx="4" fill="none" stroke="#334155" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- CENTER: Big stat text -->
  <text x="600" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="url(#orangeGlow)" text-anchor="middle" filter="url(#glow)" letter-spacing="-1">
    41% AI Code
  </text>
  <text x="600" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#94a3b8" text-anchor="middle" opacity="0.8">
    PRs +20%  |  Quality -23%  |  Reviewers: exhausted
  </text>

  <!-- Bottom bar: quality meter -->
  <g transform="translate(200, 560)">
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#64748b" opacity="0.6">CODE QUALITY</text>
    <rect x="120" y="-10" width="680" height="10" rx="5" fill="#1e293b"/>
    <rect x="120" y="-10" width="520" height="10" rx="5" fill="url(#redGrad)"/>
    <!-- Tick marks -->
    <line x1="290" y1="-14" x2="290" y2="4" stroke="#334155" stroke-width="1" opacity="0.4"/>
    <line x1="460" y1="-14" x2="460" y2="4" stroke="#334155" stroke-width="1" opacity="0.4"/>
    <line x1="630" y1="-14" x2="630" y2="4" stroke="#334155" stroke-width="1" opacity="0.4"/>
    <!-- Danger zone indicator -->
    <circle cx="640" cy="-5" r="4" fill="#ef4444" filter="url(#glow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Floating code artifacts (slop indicators) -->
  <g opacity="0.15">
    <text x="50" y="80" font-family="monospace" font-size="10" fill="#f59e0b" transform="rotate(-15, 50, 80)">// Step 1: Initialize</text>
    <text x="50" y="560" font-family="monospace" font-size="10" fill="#ef4444" transform="rotate(5, 50, 560)">TODO: fix later</text>
    <text x="900" y="530" font-family="monospace" font-size="10" fill="#f59e0b" transform="rotate(-8, 900, 530)">// Step 47: Return result</text>
    <text x="550" y="580" font-family="monospace" font-size="9" fill="#ef4444" transform="rotate(3, 550, 580)">assert.equal(broken, "works")</text>
  </g>
</svg>
