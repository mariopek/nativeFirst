<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a1e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#f59e0b" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Floating orbs -->
  <circle cx="250" cy="200" r="140" fill="#f59e0b" opacity="0.06" filter="url(#bigGlow)"/>
  <circle cx="950" cy="400" r="160" fill="#ef4444" opacity="0.05" filter="url(#bigGlow)"/>

  <!-- Giant percentage display -->
  <g transform="translate(750, 140)">
    <text x="0" y="0" fill="#22c55e" font-family="system-ui, -apple-system, sans-serif" font-size="160" font-weight="900" opacity="0.12" filter="url(#softGlow)">92%</text>
    <text x="40" y="120" fill="#ef4444" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="900" opacity="0.15" filter="url(#softGlow)">10%</text>
  </g>

  <!-- Speedometer/gauge showing disconnect -->
  <g transform="translate(200, 250)">
    <!-- Outer arc -->
    <path d="M -90,0 A 90,90 0 0,1 90,0" fill="none" stroke="#22c55e" stroke-width="8" opacity="0.3" stroke-linecap="round"/>
    <!-- Expected position arc (green) -->
    <path d="M -90,0 A 90,90 0 0,1 63.6,-63.6" fill="none" stroke="#22c55e" stroke-width="8" opacity="0.6" stroke-linecap="round" filter="url(#glow)"/>
    <!-- Actual position needle (red, barely moved) -->
    <line x1="0" y1="0" x2="-72" y2="-54" stroke="#ef4444" stroke-width="4" opacity="0.8" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="8" fill="#ef4444" opacity="0.8"/>
    <!-- Labels -->
    <text x="-100" y="30" fill="#6b7280" font-family="monospace" font-size="10" opacity="0.6">0%</text>
    <text x="85" y="30" fill="#6b7280" font-family="monospace" font-size="10" opacity="0.6">100%</text>
    <text x="0" y="50" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="11" opacity="0.7">ACTUAL PRODUCTIVITY</text>
  </g>

  <!-- Floating stats -->
  <g opacity="0.15" font-family="monospace" font-size="11">
    <text x="50" y="80" fill="#f59e0b">adoption: 92.6% ████████████████████</text>
    <text x="50" y="100" fill="#ef4444">productivity: 10% ██</text>
    <text x="700" y="520" fill="#ef4444">bugs: +41% ████████</text>
    <text x="700" y="540" fill="#f59e0b">perception: "20% faster"</text>
    <text x="700" y="560" fill="#ef4444">reality: 19% slower</text>
  </g>

  <!-- Upward trend (adoption) crossing flat line (productivity) -->
  <g transform="translate(420, 100)" opacity="0.2">
    <polyline points="0,160 30,150 60,135 90,115 120,90 150,60 180,35 210,15 240,5" fill="none" stroke="#22c55e" stroke-width="2" filter="url(#glow)"/>
    <text x="250" y="10" font-family="monospace" font-size="9" fill="#22c55e">adoption</text>
    <polyline points="0,140 30,138 60,136 90,135 120,136 150,135 180,136 210,135 240,136" fill="none" stroke="#ef4444" stroke-width="2" filter="url(#glow)"/>
    <text x="250" y="140" font-family="monospace" font-size="9" fill="#ef4444">output</text>
  </g>

  <!-- Title -->
  <text x="80" y="420" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="800" letter-spacing="-1">92% of Developers Use AI.</text>
  <text x="80" y="475" fill="url(#amberGlow)" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" filter="url(#glow)">Productivity Went Up 10%.</text>
  <text x="80" y="520" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500">What Happened?</text>

  <!-- NativeFirst badge -->
  <text x="1120" y="610" text-anchor="end" fill="#4b5563" font-family="system-ui" font-size="12">nativefirst.dev</text>

  <!-- Ambient particles -->
  <circle cx="180" cy="450" r="1.5" fill="#f59e0b" opacity="0.4"/>
  <circle cx="950" cy="200" r="1" fill="#ef4444" opacity="0.3"/>
  <circle cx="500" cy="350" r="1.5" fill="#22c55e" opacity="0.2"/>
  <circle cx="1050" cy="100" r="1" fill="#f59e0b" opacity="0.3"/>
  <circle cx="350" cy="550" r="1" fill="#ef4444" opacity="0.25"/>
</svg>