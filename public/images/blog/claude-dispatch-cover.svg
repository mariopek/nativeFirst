<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="dispBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f0a"/>
      <stop offset="40%" style="stop-color:#1c1510"/>
      <stop offset="100%" style="stop-color:#0f1a1a"/>
    </linearGradient>
    <linearGradient id="phoneGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="desktopGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="100%" style="stop-color:#b8834a"/>
    </linearGradient>
    <linearGradient id="connectGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#d4a574"/>
    </linearGradient>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Warm dark background -->
  <rect width="1200" height="630" fill="url(#dispBg)"/>

  <!-- Subtle connection lines between phone and desktop -->
  <g opacity="0.18">
    <line x1="380" y1="290" x2="680" y2="200" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="8,6"/>
    <line x1="380" y1="315" x2="680" y2="280" stroke="#10b981" stroke-width="1.5" stroke-dasharray="8,6"/>
    <line x1="380" y1="340" x2="680" y2="360" stroke="#d4a574" stroke-width="1.5" stroke-dasharray="8,6"/>
  </g>

  <!-- Glow orbs — warm amber and teal -->
  <circle cx="300" cy="315" r="180" fill="#f59e0b" opacity="0.06" filter="url(#glowStrong)"/>
  <circle cx="850" cy="280" r="200" fill="#10b981" opacity="0.04" filter="url(#glowStrong)"/>
  <circle cx="600" cy="500" r="150" fill="#d4a574" opacity="0.04" filter="url(#glowStrong)"/>

  <!-- PHONE (left side) -->
  <g transform="translate(200, 140)" filter="url(#shadow)">
    <!-- Phone body -->
    <rect x="0" y="0" width="180" height="350" rx="24" fill="#1c1917" stroke="#f59e0b" stroke-width="2" opacity="0.95"/>
    <!-- Notch -->
    <rect x="55" y="4" width="70" height="20" rx="10" fill="#0c0a09"/>
    <!-- Screen -->
    <rect x="10" y="30" width="160" height="285" rx="4" fill="#0c0a09"/>

    <!-- Chat bubbles — user messages in amber -->
    <rect x="18" y="42" width="120" height="28" rx="12" fill="#f59e0b" opacity="0.15"/>
    <text x="28" y="61" font-family="system-ui, sans-serif" font-size="9" fill="#fbbf24">"Pull Q4 sales data..."</text>

    <!-- Claude response in warm beige -->
    <rect x="48" y="78" width="114" height="24" rx="12" fill="#d4a574" opacity="0.12"/>
    <text x="56" y="94" font-family="system-ui, sans-serif" font-size="8" fill="#d4a574">Working on it...</text>

    <rect x="18" y="112" width="130" height="28" rx="12" fill="#f59e0b" opacity="0.15"/>
    <text x="28" y="131" font-family="system-ui, sans-serif" font-size="9" fill="#fbbf24">"Also draft that email"</text>

    <rect x="38" y="150" width="124" height="24" rx="12" fill="#d4a574" opacity="0.12"/>
    <text x="46" y="166" font-family="system-ui, sans-serif" font-size="8" fill="#d4a574">Report ready. Email drafted.</text>

    <!-- Status indicator — green -->
    <rect x="18" y="190" width="144" height="40" rx="8" fill="#10b981" opacity="0.08"/>
    <circle cx="34" cy="210" r="5" fill="#10b981" opacity="0.8"/>
    <text x="46" y="207" font-family="system-ui, sans-serif" font-weight="600" font-size="9" fill="#34d399">Desktop Connected</text>
    <text x="46" y="220" font-family="system-ui, sans-serif" font-size="8" fill="#78716c">MacBook Pro • Cowork</text>

    <!-- Claude logo in phone -->
    <rect x="18" y="244" width="144" height="60" rx="8" fill="#d4a574" opacity="0.06"/>
    <circle cx="54" cy="274" r="16" fill="#d4a574" opacity="0.15"/>
    <text x="54" y="280" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="16" fill="#d4a574">C</text>
    <text x="80" y="270" font-family="system-ui, sans-serif" font-weight="700" font-size="13" fill="#d4a574">Claude</text>
    <text x="80" y="286" font-family="system-ui, sans-serif" font-weight="500" font-size="9" fill="#92400e">Dispatch Active</text>

    <!-- Home indicator -->
    <rect x="65" y="326" width="50" height="4" rx="2" fill="#57534e"/>

    <!-- Glow ring around phone — amber -->
    <rect x="-4" y="-4" width="188" height="358" rx="28" fill="none" stroke="url(#phoneGlow)" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Arrow animation dots — gradient from amber to teal -->
  <g>
    <circle cx="430" cy="295" r="4" fill="#f59e0b" opacity="0.7"/>
    <circle cx="470" cy="288" r="3" fill="#d97706" opacity="0.5"/>
    <circle cx="510" cy="278" r="4" fill="#10b981" opacity="0.7"/>
    <circle cx="550" cy="268" r="3" fill="#10b981" opacity="0.5"/>
    <circle cx="590" cy="258" r="4" fill="#d4a574" opacity="0.7"/>
    <circle cx="630" cy="248" r="3" fill="#d4a574" opacity="0.5"/>
  </g>

  <!-- DISPATCH label in the middle -->
  <g transform="translate(440, 340)">
    <rect x="0" y="0" width="180" height="38" rx="19" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.25"/>
    <circle cx="24" cy="19" r="10" fill="#d4a574" opacity="0.15"/>
    <text x="24" y="24" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="12" fill="#d4a574">C</text>
    <text x="108" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="14" fill="#f59e0b" filter="url(#glowSoft)">DISPATCH</text>
  </g>

  <!-- DESKTOP (right side) -->
  <g transform="translate(640, 100)" filter="url(#shadow)">
    <!-- Monitor body -->
    <rect x="0" y="0" width="440" height="290" rx="16" fill="#1c1917" stroke="#d4a574" stroke-width="1.5" opacity="0.95"/>
    <!-- Monitor screen -->
    <rect x="8" y="8" width="424" height="250" rx="4" fill="#0c0a09"/>

    <!-- Title bar -->
    <rect x="8" y="8" width="424" height="28" fill="#1c1917"/>
    <circle cx="24" cy="22" r="5" fill="#ef4444"/>
    <circle cx="42" cy="22" r="5" fill="#fbbf24"/>
    <circle cx="60" cy="22" r="5" fill="#22c55e"/>
    <text x="220" y="26" text-anchor="middle" font-family="monospace" font-size="10" fill="#78716c">Claude Cowork — Dispatch Mode</text>

    <!-- Desktop content: file operations -->
    <text x="20" y="56" font-family="monospace" font-size="10" fill="#d4a574">Task: Pull Q4 sales data</text>

    <text x="20" y="76" font-family="monospace" font-size="9" fill="#10b981">✓ Found sales-q4.xlsx</text>
    <text x="20" y="92" font-family="monospace" font-size="9" fill="#10b981">✓ Compared with Q2 data</text>
    <text x="20" y="108" font-family="monospace" font-size="9" fill="#10b981">✓ Built summary with charts</text>
    <text x="20" y="124" font-family="monospace" font-size="9" fill="#10b981">✓ Saved to Desktop/Reports/</text>

    <rect x="20" y="138" width="400" height="1" fill="#44403c" opacity="0.5"/>

    <text x="20" y="158" font-family="monospace" font-size="10" fill="#d4a574">Task: Draft email reply</text>

    <text x="20" y="178" font-family="monospace" font-size="9" fill="#f59e0b">⏳ Reading email thread...</text>
    <text x="20" y="194" font-family="monospace" font-size="9" fill="#f59e0b">⏳ Drafting professional reply...</text>
    <text x="20" y="210" font-family="monospace" font-size="9" fill="#78716c">   tone: firm about deadline</text>

    <!-- Status bar -->
    <rect x="20" y="228" width="400" height="22" rx="6" fill="#10b981" opacity="0.06"/>
    <text x="32" y="243" font-family="monospace" font-size="9" fill="#34d399">Dispatch: 2 tasks complete • 1 in progress • Connected via iPhone</text>

    <!-- Monitor stand -->
    <rect x="180" y="290" width="80" height="16" fill="#292524" rx="2"/>
    <rect x="160" y="306" width="120" height="8" fill="#292524" rx="4"/>

    <!-- Glow ring -->
    <rect x="-4" y="-4" width="448" height="298" rx="20" fill="none" stroke="url(#desktopGlow)" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="600" y="520" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="34">
    Claude Dispatch Just Dropped
  </text>
  <text x="600" y="556" text-anchor="middle" fill="#a8a29e" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="17">
    Your phone commands. Your desktop executes. You live your life.
  </text>

  <!-- Branding -->
  <text x="80" y="608" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="14" fill="#78716c">NativeFirst</text>
  <text x="1120" y="608" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="13" fill="#d4a574" text-anchor="end">nativefirstapp.com</text>
</svg>