<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c62a42"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="goldGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Left side: App Store gate (RED - blocked) -->
  <g transform="translate(120, 100)">
    <!-- Gate frame -->
    <rect x="0" y="0" width="400" height="420" rx="20" fill="#1e1e3a" stroke="#e94560" stroke-width="2" opacity="0.8"/>

    <!-- App Store icon -->
    <g transform="translate(160, 30)">
      <rect x="0" y="0" width="80" height="80" rx="18" fill="#0d84ff" opacity="0.9"/>
      <text x="40" y="52" font-family="Arial, sans-serif" font-size="36" fill="white" text-anchor="middle" font-weight="bold">A</text>
    </g>

    <!-- "BLOCKED" banner -->
    <g filter="url(#glow)">
      <rect x="50" y="130" width="300" height="50" rx="8" fill="url(#redGlow)" opacity="0.9"/>
      <text x="200" y="162" font-family="'Courier New', monospace" font-size="22" fill="white" text-anchor="middle" font-weight="bold" letter-spacing="4">BLOCKED</text>
    </g>

    <!-- Blocked apps list -->
    <g transform="translate(50, 210)">
      <rect x="0" y="0" width="300" height="45" rx="8" fill="#2a1525" stroke="#e94560" stroke-width="1" opacity="0.7"/>
      <circle cx="25" cy="22" r="8" fill="#e94560" opacity="0.6"/>
      <line x1="19" y1="16" x2="31" y2="28" stroke="white" stroke-width="2"/>
      <line x1="31" y1="16" x2="19" y2="28" stroke="white" stroke-width="2"/>
      <text x="45" y="27" font-family="'SF Pro Display', Arial, sans-serif" font-size="16" fill="#f0a0a0">Replit</text>
      <text x="250" y="27" font-family="'Courier New', monospace" font-size="11" fill="#e94560" text-anchor="end">§ 2.5.2</text>
    </g>

    <g transform="translate(50, 270)">
      <rect x="0" y="0" width="300" height="45" rx="8" fill="#2a1525" stroke="#e94560" stroke-width="1" opacity="0.7"/>
      <circle cx="25" cy="22" r="8" fill="#e94560" opacity="0.6"/>
      <line x1="19" y1="16" x2="31" y2="28" stroke="white" stroke-width="2"/>
      <line x1="31" y1="16" x2="19" y2="28" stroke="white" stroke-width="2"/>
      <text x="45" y="27" font-family="'SF Pro Display', Arial, sans-serif" font-size="16" fill="#f0a0a0">Vibecode</text>
      <text x="250" y="27" font-family="'Courier New', monospace" font-size="11" fill="#e94560" text-anchor="end">§ 2.5.2</text>
    </g>

    <!-- Red glow effect at bottom -->
    <rect x="0" y="350" width="400" height="70" rx="0 0 20 20" fill="#e94560" opacity="0.05"/>
    <text x="200" y="390" font-family="'SF Pro Display', Arial, sans-serif" font-size="13" fill="#e94560" text-anchor="middle" opacity="0.7">App Store Review · March 18, 2026</text>
  </g>

  <!-- Center divider with VS -->
  <g transform="translate(560, 250)">
    <line x1="0" y1="-120" x2="0" y2="120" stroke="#fbbf24" stroke-width="1" opacity="0.3" stroke-dasharray="6 4"/>
    <rect x="-30" y="-20" width="60" height="40" rx="20" fill="#1a1a2e" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="0" y="7" font-family="'SF Pro Display', Arial, sans-serif" font-size="16" fill="#fbbf24" text-anchor="middle" font-weight="bold">VS</text>
  </g>

  <!-- Right side: Xcode AI (GREEN - approved) -->
  <g transform="translate(640, 100)">
    <!-- Gate frame -->
    <rect x="0" y="0" width="420" height="420" rx="20" fill="#1e3a1e" stroke="#4ade80" stroke-width="2" opacity="0.6"/>

    <!-- Xcode icon -->
    <g transform="translate(170, 30)">
      <rect x="0" y="0" width="80" height="80" rx="18" fill="#147EFB" opacity="0.9"/>
      <text x="40" y="55" font-family="Arial, sans-serif" font-size="40" fill="white" text-anchor="middle" font-weight="bold">X</text>
    </g>

    <!-- "APPROVED" banner -->
    <g filter="url(#glow)">
      <rect x="60" y="130" width="300" height="50" rx="8" fill="url(#greenGlow)" opacity="0.9"/>
      <text x="210" y="162" font-family="'Courier New', monospace" font-size="22" fill="white" text-anchor="middle" font-weight="bold" letter-spacing="4">APPROVED</text>
    </g>

    <!-- Approved features list -->
    <g transform="translate(60, 210)">
      <rect x="0" y="0" width="300" height="45" rx="8" fill="#152a15" stroke="#4ade80" stroke-width="1" opacity="0.7"/>
      <circle cx="25" cy="22" r="8" fill="#4ade80" opacity="0.6"/>
      <polyline points="19,22 23,26 31,18" stroke="white" stroke-width="2" fill="none"/>
      <text x="45" y="27" font-family="'SF Pro Display', Arial, sans-serif" font-size="16" fill="#a0f0a0">Claude AI Agent</text>
      <text x="260" y="27" font-family="'Courier New', monospace" font-size="11" fill="#4ade80" text-anchor="end">MCP</text>
    </g>

    <g transform="translate(60, 270)">
      <rect x="0" y="0" width="300" height="45" rx="8" fill="#152a15" stroke="#4ade80" stroke-width="1" opacity="0.7"/>
      <circle cx="25" cy="22" r="8" fill="#4ade80" opacity="0.6"/>
      <polyline points="19,22 23,26 31,18" stroke="white" stroke-width="2" fill="none"/>
      <text x="45" y="27" font-family="'SF Pro Display', Arial, sans-serif" font-size="16" fill="#a0f0a0">OpenAI Codex</text>
      <text x="260" y="27" font-family="'Courier New', monospace" font-size="11" fill="#4ade80" text-anchor="end">MCP</text>
    </g>

    <!-- Green glow effect at bottom -->
    <rect x="0" y="350" width="420" height="70" fill="#4ade80" opacity="0.05"/>
    <text x="210" y="390" font-family="'SF Pro Display', Arial, sans-serif" font-size="13" fill="#4ade80" text-anchor="middle" opacity="0.7">Xcode 26.3 · February 26, 2026</text>
  </g>

  <!-- Bottom title bar -->
  <rect x="0" y="540" width="1200" height="90" fill="#0a0a1a" opacity="0.8"/>

  <!-- Title text -->
  <text x="600" y="578" font-family="'SF Pro Display', Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" font-weight="bold">
    Rules for Thee, Not for Me
  </text>
  <text x="600" y="605" font-family="'SF Pro Display', Arial, sans-serif" font-size="14" fill="#fbbf24" text-anchor="middle" opacity="0.8">
    Apple's Vibe Coding Double Standard · NativeFirst
  </text>

  <!-- Decorative corner elements -->
  <g opacity="0.15">
    <circle cx="50" cy="50" r="80" fill="#e94560"/>
    <circle cx="1150" cy="580" r="100" fill="#4ade80"/>
    <circle cx="1100" cy="50" r="60" fill="#fbbf24"/>
  </g>
</svg>