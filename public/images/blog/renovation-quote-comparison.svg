<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="520" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="19" font-weight="bold" fill="#f8fafc">Same Bathroom, 3 Quotes — What's Actually Included?</text>
  <line x1="220" y1="52" x2="580" y2="52" stroke="#f97316" stroke-width="2" opacity="0.6"/>

  <!-- Column headers -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">
    <text x="320" y="80" text-anchor="middle">Quote #1</text>
    <text x="500" y="80" text-anchor="middle">Quote #2</text>
    <text x="680" y="80" text-anchor="middle">Quote #3</text>
  </g>

  <!-- Price headers -->
  <text x="320" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#22c55e">$8,000</text>
  <text x="500" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#f97316">$14,000</text>
  <text x="680" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#ef4444">$22,000</text>

  <line x1="40" y1="120" x2="760" y2="120" stroke="#334155" stroke-width="1"/>

  <!-- Row items -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="14">
    <!-- Labor -->
    <text x="60" y="155" fill="#e2e8f0" font-weight="600">Labor</text>
    <text x="320" y="155" text-anchor="middle" fill="#22c55e">✓</text>
    <text x="500" y="155" text-anchor="middle" fill="#22c55e">✓</text>
    <text x="680" y="155" text-anchor="middle" fill="#22c55e">✓</text>

    <line x1="40" y1="170" x2="760" y2="170" stroke="#1e293b" stroke-width="1"/>

    <!-- Rough materials -->
    <text x="60" y="200" fill="#e2e8f0" font-weight="600">Rough materials</text>
    <text x="290" y="200" fill="#ef4444" font-size="12">Not included</text>
    <text x="500" y="200" text-anchor="middle" fill="#22c55e">✓</text>
    <text x="680" y="200" text-anchor="middle" fill="#22c55e">✓</text>

    <line x1="40" y1="215" x2="760" y2="215" stroke="#1e293b" stroke-width="1"/>

    <!-- Tiles & fixtures -->
    <text x="60" y="245" fill="#e2e8f0" font-weight="600">Tiles, vanity, fixtures</text>
    <text x="290" y="245" fill="#ef4444" font-size="12">You buy</text>
    <text x="470" y="245" fill="#ef4444" font-size="12">You buy</text>
    <text x="680" y="245" text-anchor="middle" fill="#22c55e">✓</text>

    <line x1="40" y1="260" x2="760" y2="260" stroke="#1e293b" stroke-width="1"/>

    <!-- Plumbing -->
    <text x="60" y="290" fill="#e2e8f0" font-weight="600">Plumbing work</text>
    <text x="290" y="290" fill="#ef4444" font-size="12">Not included</text>
    <text x="500" y="290" text-anchor="middle" fill="#22c55e">✓</text>
    <text x="680" y="290" text-anchor="middle" fill="#22c55e">✓</text>

    <line x1="40" y1="305" x2="760" y2="305" stroke="#1e293b" stroke-width="1"/>

    <!-- Electrical -->
    <text x="60" y="335" fill="#e2e8f0" font-weight="600">Electrical</text>
    <text x="290" y="335" fill="#ef4444" font-size="12">Not included</text>
    <text x="470" y="335" fill="#eab308" font-size="12">Basic only</text>
    <text x="680" y="335" text-anchor="middle" fill="#22c55e">✓</text>

    <line x1="40" y1="350" x2="760" y2="350" stroke="#1e293b" stroke-width="1"/>

    <!-- Permits -->
    <text x="60" y="380" fill="#e2e8f0" font-weight="600">Permits &amp; cleanup</text>
    <text x="290" y="380" fill="#ef4444" font-size="12">Not included</text>
    <text x="470" y="380" fill="#ef4444" font-size="12">Not included</text>
    <text x="680" y="380" text-anchor="middle" fill="#22c55e">✓</text>

    <line x1="40" y1="395" x2="760" y2="395" stroke="#1e293b" stroke-width="1"/>

    <!-- Material quality -->
    <text x="60" y="425" fill="#e2e8f0" font-weight="600">Material quality</text>
    <text x="290" y="425" fill="#94a3b8" font-size="12">Builder grade</text>
    <text x="470" y="425" fill="#94a3b8" font-size="12">Mid-range</text>
    <text x="650" y="425" fill="#94a3b8" font-size="12">Premium</text>
  </g>

  <!-- Bottom callout -->
  <g transform="translate(40, 455)">
    <rect x="0" y="0" width="720" height="48" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="1" opacity="0.9"/>
    <text x="360" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#f97316">These aren't 3 prices for the same job — they're 3 completely different projects.</text>
  </g>
</svg>
