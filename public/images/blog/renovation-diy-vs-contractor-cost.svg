<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="380" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="19" font-weight="bold" fill="#f8fafc">DIY Materials vs. Contractor Quote: Bathroom Remodel</text>
  <line x1="200" y1="52" x2="600" y2="52" stroke="#f97316" stroke-width="2" opacity="0.6"/>

  <!-- DIY side -->
  <g transform="translate(50, 75)" font-family="system-ui, -apple-system, sans-serif" filter="url(#shadow)">
    <rect x="0" y="0" width="320" height="260" rx="14" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>

    <text x="160" y="32" text-anchor="middle" font-size="14" font-weight="bold" fill="#22c55e">DIY — Materials Only</text>
    <line x1="20" y1="44" x2="300" y2="44" stroke="#334155" stroke-width="1"/>

    <text x="30" y="72" font-size="13" fill="#e2e8f0">Tile (floor + shower)</text>
    <text x="280" y="72" text-anchor="end" font-size="13" fill="#94a3b8">$600</text>

    <text x="30" y="100" font-size="13" fill="#e2e8f0">Vanity + countertop</text>
    <text x="280" y="100" text-anchor="end" font-size="13" fill="#94a3b8">$450</text>

    <text x="30" y="128" font-size="13" fill="#e2e8f0">Toilet</text>
    <text x="280" y="128" text-anchor="end" font-size="13" fill="#94a3b8">$250</text>

    <text x="30" y="156" font-size="13" fill="#e2e8f0">Mirror + lighting</text>
    <text x="280" y="156" text-anchor="end" font-size="13" fill="#94a3b8">$200</text>

    <text x="30" y="184" font-size="13" fill="#e2e8f0">Paint + supplies</text>
    <text x="280" y="184" text-anchor="end" font-size="13" fill="#94a3b8">$150</text>

    <text x="30" y="212" font-size="13" fill="#e2e8f0">Backsplash tile</text>
    <text x="280" y="212" text-anchor="end" font-size="13" fill="#94a3b8">$200</text>

    <text x="30" y="240" font-size="13" fill="#e2e8f0">Misc (grout, caulk, etc.)</text>
    <text x="280" y="240" text-anchor="end" font-size="13" fill="#94a3b8">$150</text>

    <line x1="200" y1="248" x2="290" y2="248" stroke="#22c55e" stroke-width="1"/>
    <text x="160" y="260" text-anchor="middle" font-size="20" font-weight="bold" fill="#22c55e">≈ $2,000</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(385, 180)">
    <text x="15" y="10" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#f97316">→</text>
    <text x="15" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">+ labor</text>
    <text x="15" y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">+ markup</text>
    <text x="15" y="61" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">+ profit</text>
  </g>

  <!-- Contractor side -->
  <g transform="translate(430, 75)" font-family="system-ui, -apple-system, sans-serif" filter="url(#shadow)">
    <rect x="0" y="0" width="320" height="260" rx="14" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>

    <text x="160" y="32" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef4444">Contractor Quotes</text>
    <line x1="20" y1="44" x2="300" y2="44" stroke="#334155" stroke-width="1"/>

    <text x="30" y="80" font-size="13" fill="#e2e8f0">Quote #1 (labor only)</text>
    <text x="280" y="80" text-anchor="end" font-size="16" font-weight="bold" fill="#22c55e">$8,000</text>

    <text x="30" y="128" font-size="13" fill="#e2e8f0">Quote #2 (labor + rough)</text>
    <text x="280" y="128" text-anchor="end" font-size="16" font-weight="bold" fill="#f97316">$14,000</text>

    <text x="30" y="176" font-size="13" fill="#e2e8f0">Quote #3 (full turnkey)</text>
    <text x="280" y="176" text-anchor="end" font-size="16" font-weight="bold" fill="#ef4444">$22,000</text>

    <line x1="20" y1="200" x2="300" y2="200" stroke="#334155" stroke-width="1"/>

    <text x="160" y="230" text-anchor="middle" font-size="12" fill="#94a3b8">Labor + markup accounts for</text>
    <text x="160" y="252" text-anchor="middle" font-size="18" font-weight="bold" fill="#f97316">75-90% of the final price</text>
  </g>

  <!-- Bottom note -->
  <text x="400" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">Knowing your material costs is your best weapon when evaluating contractor quotes.</text>
</svg>
