<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070b1f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a1633;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#070b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc;stop-opacity:0.18" />
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:0.10" />
      <stop offset="100%" style="stop-color:#fbcfe8;stop-opacity:0.18" />
    </linearGradient>
    <linearGradient id="glassEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7dd3fc;stop-opacity:0.7" />
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#fbcfe8;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="orbBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:0" />
    </linearGradient>
    <radialGradient id="orbPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3b0764;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="orbPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:0.75" />
      <stop offset="100%" style="stop-color:#831843;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigBlur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="frost">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <g opacity="0.07">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#a5b4fc"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Color orbs behind the glass -->
  <circle cx="270" cy="220" r="150" fill="url(#orbBlue)" filter="url(#bigBlur)"/>
  <circle cx="900" cy="180" r="170" fill="url(#orbPurple)" filter="url(#bigBlur)"/>
  <circle cx="640" cy="500" r="180" fill="url(#orbPink)" filter="url(#bigBlur)"/>

  <!-- Glass card 1 (toolbar pill) -->
  <g filter="url(#frost)">
    <rect x="180" y="120" width="340" height="68" rx="34" fill="url(#glassFill)" stroke="url(#glassEdge)" stroke-width="1.2" stroke-opacity="0.55"/>
  </g>
  <text x="218" y="162" font-family="'SF Pro', system-ui, sans-serif" font-size="20" fill="#e0e7ff" opacity="0.92" font-weight="600">‹  Library</text>
  <circle cx="430" cy="154" r="14" fill="#fff" opacity="0.18"/>
  <circle cx="470" cy="154" r="14" fill="#fff" opacity="0.18"/>
  <text x="426" y="160" font-family="system-ui" font-size="16" fill="#fff" opacity="0.85">+</text>
  <text x="465" y="160" font-family="system-ui" font-size="16" fill="#fff" opacity="0.85">⚙</text>

  <!-- Glass card 2 (sheet) -->
  <g filter="url(#frost)">
    <rect x="700" y="240" width="380" height="240" rx="28" fill="url(#glassFill)" stroke="url(#glassEdge)" stroke-width="1.2" stroke-opacity="0.55"/>
  </g>
  <rect x="730" y="270" width="120" height="14" rx="7" fill="#fff" opacity="0.55"/>
  <rect x="730" y="298" width="320" height="10" rx="5" fill="#fff" opacity="0.18"/>
  <rect x="730" y="318" width="280" height="10" rx="5" fill="#fff" opacity="0.18"/>
  <rect x="730" y="338" width="240" height="10" rx="5" fill="#fff" opacity="0.18"/>
  <rect x="730" y="420" width="320" height="40" rx="20" fill="#fff" opacity="0.16" stroke="#fff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="890" y="446" font-family="system-ui" font-size="16" fill="#fff" opacity="0.92" text-anchor="middle" font-weight="600">Continue</text>

  <!-- Glass card 3 (tab bar) -->
  <g filter="url(#frost)">
    <rect x="180" y="430" width="430" height="74" rx="37" fill="url(#glassFill)" stroke="url(#glassEdge)" stroke-width="1.2" stroke-opacity="0.55"/>
  </g>
  <g opacity="0.85">
    <circle cx="240" cy="467" r="10" fill="#fff"/>
    <circle cx="320" cy="467" r="10" fill="#fff" opacity="0.5"/>
    <circle cx="400" cy="467" r="10" fill="#fff" opacity="0.5"/>
    <circle cx="480" cy="467" r="10" fill="#fff" opacity="0.5"/>
    <circle cx="560" cy="467" r="10" fill="#fff" opacity="0.5"/>
  </g>

  <!-- Center title -->
  <text x="600" y="324" font-family="'SF Pro', system-ui, sans-serif" font-size="46" font-weight="800" fill="#fff" text-anchor="middle" filter="url(#glow)" opacity="0.97">Liquid Glass,</text>
  <text x="600" y="370" font-family="'SF Pro', system-ui, sans-serif" font-size="46" font-weight="800" fill="#fff" text-anchor="middle" opacity="0.97">for Free</text>

  <!-- Top-left meta -->
  <text x="44" y="56" font-family="'SF Mono', 'Menlo', monospace" font-size="13" fill="#a5b4fc" opacity="0.7">swiftui  ·  ios 26  ·  xcode 26</text>
  <text x="44" y="82" font-family="'SF Mono', 'Menlo', monospace" font-size="12" fill="#64748b" opacity="0.85">day 4 of 30  ·  ios dev series</text>

  <!-- Pill: just recompile -->
  <rect x="44" y="540" width="220" height="34" rx="17" fill="#10b981" opacity="0.18" stroke="#10b981" stroke-width="1" stroke-opacity="0.55"/>
  <text x="154" y="562" font-family="monospace" font-size="13" fill="#34d399" text-anchor="middle" font-weight="700">just recompile  →  win</text>

  <text x="1156" y="610" font-family="'SF Mono', 'Menlo', monospace" font-size="11" fill="#475569" text-anchor="end" opacity="0.55">nativefirst.dev</text>
</svg>
