<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#111127"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#eab308"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Floating chat bubbles representing rumors -->
  <!-- Bubble 1 -->
  <g transform="translate(80, 120)">
    <rect x="0" y="0" width="220" height="70" rx="16" fill="#1e1e3a" stroke="#f97316" stroke-width="1" opacity="0.8"/>
    <text x="20" y="30" font-family="system-ui, sans-serif" font-size="13" fill="#f97316">"vibe coding is dead"</text>
    <text x="20" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#888">@dev_skeptic on X</text>
  </g>

  <!-- Bubble 2 -->
  <g transform="translate(900, 80)">
    <rect x="0" y="0" width="240" height="70" rx="16" fill="#1e1e3a" stroke="#ec4899" stroke-width="1" opacity="0.8"/>
    <text x="20" y="30" font-family="system-ui, sans-serif" font-size="13" fill="#ec4899">"shipped my MVP in 4 hours"</text>
    <text x="20" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#888">r/webdev</text>
  </g>

  <!-- Bubble 3 -->
  <g transform="translate(60, 420)">
    <rect x="0" y="0" width="260" height="70" rx="16" fill="#1e1e3a" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
    <text x="20" y="30" font-family="system-ui, sans-serif" font-size="13" fill="#3b82f6">"agentic engineering is next"</text>
    <text x="20" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#888">@karpathy</text>
  </g>

  <!-- Bubble 4 -->
  <g transform="translate(870, 460)">
    <rect x="0" y="0" width="270" height="70" rx="16" fill="#1e1e3a" stroke="#a855f7" stroke-width="1" opacity="0.8"/>
    <text x="20" y="30" font-family="system-ui, sans-serif" font-size="13" fill="#a855f7">"2.74x more security bugs"</text>
    <text x="20" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#888">CodeRabbit Research</text>
  </g>

  <!-- Center title area -->
  <g transform="translate(600, 260)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-weight="900" font-size="52" fill="url(#accent)" text-anchor="middle" letter-spacing="-1">
      VIBE CODING
    </text>
    <text x="0" y="55" font-family="system-ui, sans-serif" font-weight="900" font-size="42" fill="white" text-anchor="middle" letter-spacing="-1">
      Rumors, Drama &amp; Reality
    </text>
    <text x="0" y="100" font-family="system-ui, sans-serif" font-size="18" fill="#888" text-anchor="middle">
      What the internet is actually saying in March 2026
    </text>
  </g>

  <!-- Decorative elements -->
  <circle cx="420" cy="180" r="80" fill="#f97316" opacity="0.03"/>
  <circle cx="780" cy="450" r="100" fill="#3b82f6" opacity="0.03"/>
  <circle cx="600" cy="315" r="150" fill="#a855f7" opacity="0.02"/>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)" opacity="0.6"/>
</svg>