<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d1f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="mainactor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="nonisolated" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="concurrent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="detached" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5568"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="520"/>
    <line x1="300" y1="0" x2="300" y2="520"/>
    <line x1="450" y1="0" x2="450" y2="520"/>
    <line x1="600" y1="0" x2="600" y2="520"/>
    <line x1="750" y1="0" x2="750" y2="520"/>
  </g>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="22" font-weight="700" fill="#ffffff" letter-spacing="-0.3">Swift 6.2 Concurrency: The Decision Tree</text>
  <text x="450" y="60" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="12" fill="#64748b" letter-spacing="0.5">@MainActor  ·  nonisolated  ·  @concurrent  ·  Task.detached</text>

  <!-- START NODE -->
  <rect x="325" y="80" width="250" height="56" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="450" y="104" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="11" fill="#94a3b8" letter-spacing="0.8">WHAT KIND OF WORK IS THIS?</text>
  <text x="450" y="124" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">Pick your scenario</text>

  <!-- Arrow down from start -->
  <line x1="450" y1="136" x2="450" y2="158" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DIAMOND: 4 branches spread out -->
  <!-- Branch labels along a horizontal split line -->
  <!-- We'll use 4 vertical columns -->

  <!-- Column connector line -->
  <line x1="100" y1="168" x2="800" y2="168" stroke="#334155" stroke-width="1.5"/>
  <circle cx="450" cy="168" r="4" fill="#334155"/>

  <!-- Branch 1: UI/State — x=100 -->
  <line x1="100" y1="168" x2="100" y2="190" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Branch 2: Network I/O — x=320 -->
  <line x1="320" y1="168" x2="320" y2="190" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- Branch 3: CPU-heavy — x=580 -->
  <line x1="580" y1="168" x2="580" y2="190" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Branch 4: Blocking I/O — x=800 -->
  <line x1="800" y1="168" x2="800" y2="190" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Scenario labels -->
  <text x="100" y="162" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="10" fill="#3b82f6">UI / State</text>
  <text x="320" y="162" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="10" fill="#f59e0b">Network I/O</text>
  <text x="580" y="162" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="10" fill="#10b981">CPU Heavy</text>
  <text x="800" y="162" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="10" fill="#8b5cf6">Blocking I/O</text>

  <!-- RESULT BOX 1: @MainActor — blue -->
  <rect x="20" y="200" width="160" height="80" rx="10" fill="url(#mainactor)" opacity="0.9"/>
  <text x="100" y="230" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="11" fill="#bfdbfe" letter-spacing="0.5">ANNOTATION</text>
  <text x="100" y="252" text-anchor="middle" font-family="SF Mono, Menlo, Monaco, monospace" font-size="16" font-weight="700" fill="#ffffff">@MainActor</text>
  <text x="100" y="270" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="10" fill="#bfdbfe">(module default)</text>

  <!-- RESULT BOX 2: nonisolated — amber -->
  <rect x="240" y="200" width="160" height="80" rx="10" fill="url(#nonisolated)" opacity="0.9"/>
  <text x="320" y="230" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="11" fill="#fef3c7" letter-spacing="0.5">ANNOTATION</text>
  <text x="320" y="252" text-anchor="middle" font-family="SF Mono, Menlo, Monaco, monospace" font-size="16" font-weight="700" fill="#ffffff">nonisolated</text>
  <text x="320" y="270" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="10" fill="#fef3c7">URLSession handles threads</text>

  <!-- RESULT BOX 3: @concurrent — green -->
  <rect x="500" y="200" width="160" height="80" rx="10" fill="url(#concurrent)" opacity="0.9"/>
  <text x="580" y="230" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="11" fill="#d1fae5" letter-spacing="0.5">ANNOTATION</text>
  <text x="580" y="252" text-anchor="middle" font-family="SF Mono, Menlo, Monaco, monospace" font-size="16" font-weight="700" fill="#ffffff">@concurrent</text>
  <text x="580" y="270" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="10" fill="#d1fae5">cooperative thread pool</text>

  <!-- RESULT BOX 4: nonisolated + Task.detached — purple -->
  <rect x="720" y="200" width="160" height="80" rx="10" fill="url(#detached)" opacity="0.9"/>
  <text x="800" y="222" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="11" fill="#ede9fe" letter-spacing="0.5">ANNOTATION</text>
  <text x="800" y="244" text-anchor="middle" font-family="SF Mono, Menlo, Monaco, monospace" font-size="13" font-weight="700" fill="#ffffff">nonisolated</text>
  <text x="800" y="262" text-anchor="middle" font-family="SF Mono, Menlo, Monaco, monospace" font-size="11" fill="#c4b5fd">+ Task.detached</text>
  <text x="800" y="276" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="10" fill="#ede9fe">blocks cooperative pool</text>

  <!-- Arrows down to examples -->
  <line x1="100" y1="280" x2="100" y2="308" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="320" y1="280" x2="320" y2="308" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <line x1="580" y1="280" x2="580" y2="308" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="800" y1="280" x2="800" y2="308" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Code snippet boxes -->
  <!-- Box 1 -->
  <rect x="20" y="318" width="160" height="82" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="35" y="338" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#64748b">// ViewModel</text>
  <text x="35" y="354" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#93c5fd">@Observable</text>
  <text x="35" y="370" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#e2e8f0">class InvoiceVM <tspan fill="#64748b">{</tspan></text>
  <text x="35" y="386" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#e2e8f0">  var invoices<tspan fill="#64748b">: [Invoice]</tspan></text>
  <text x="35" y="395" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#64748b">}</text>

  <!-- Box 2 -->
  <rect x="240" y="318" width="160" height="82" rx="8" fill="#0f172a" stroke="#3f2a06" stroke-width="1"/>
  <text x="255" y="338" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#64748b">// Service</text>
  <text x="255" y="354" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#fcd34d">struct UserRepo <tspan fill="#64748b">{</tspan></text>
  <text x="255" y="370" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#6ee7b7">  nonisolated</text>
  <text x="255" y="386" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#e2e8f0">  func fetch<tspan fill="#64748b">() async</tspan></text>
  <text x="255" y="395" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#64748b">}</text>

  <!-- Box 3 -->
  <rect x="500" y="318" width="160" height="82" rx="8" fill="#0f172a" stroke="#064e3b" stroke-width="1"/>
  <text x="515" y="338" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#64748b">// Decoder</text>
  <text x="515" y="354" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#fcd34d">struct ImageDecoder <tspan fill="#64748b">{</tspan></text>
  <text x="515" y="370" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#6ee7b7">  @concurrent</text>
  <text x="515" y="386" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#e2e8f0">  func decode<tspan fill="#64748b">() async</tspan></text>
  <text x="515" y="395" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#64748b">}</text>

  <!-- Box 4 -->
  <rect x="720" y="318" width="160" height="82" rx="8" fill="#0f172a" stroke="#2e1065" stroke-width="1"/>
  <text x="735" y="338" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#64748b">// File Store</text>
  <text x="735" y="354" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#fcd34d">struct ConfigStore <tspan fill="#64748b">{</tspan></text>
  <text x="735" y="370" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#6ee7b7">  nonisolated</text>
  <text x="735" y="386" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#e2e8f0">  Task.detached</text>
  <text x="735" y="395" font-family="SF Mono, Menlo, Monaco, monospace" font-size="9" fill="#64748b">{ blocking I/O }</text>

  <!-- Scenario labels at bottom -->
  <text x="100" y="420" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="11" fill="#3b82f6" font-weight="600">UI / State</text>
  <text x="100" y="435" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="10" fill="#475569">ViewModel, view binding</text>

  <text x="320" y="420" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="11" fill="#f59e0b" font-weight="600">Network I/O</text>
  <text x="320" y="435" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="10" fill="#475569">Repository, API service</text>

  <text x="580" y="420" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="11" fill="#10b981" font-weight="600">CPU Heavy</text>
  <text x="580" y="435" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="10" fill="#475569">Image, crypto, parsing</text>

  <text x="800" y="420" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="11" fill="#8b5cf6" font-weight="600">Blocking I/O</text>
  <text x="800" y="435" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="10" fill="#475569">File read/write, CoreData</text>

  <!-- Bottom rule -->
  <line x1="60" y1="460" x2="840" y2="460" stroke="#1e293b" stroke-width="1"/>

  <!-- One-line rule -->
  <text x="450" y="482" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="12" fill="#475569">UI/State → default  ·  Network → </text>
  <text x="450" y="482" text-anchor="middle" font-family="SF Mono, Menlo, Monaco, monospace" font-size="12" fill="#475569">                                          </text>

  <text x="450" y="483" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="12" fill="#64748b">
    <tspan>UI/State → module default  ·  Network → </tspan>
    <tspan font-family="SF Mono, Menlo, Monaco, monospace" fill="#f59e0b">nonisolated</tspan>
    <tspan>  ·  CPU → </tspan>
    <tspan font-family="SF Mono, Menlo, Monaco, monospace" fill="#10b981">@concurrent</tspan>
    <tspan>  ·  Files → </tspan>
    <tspan font-family="SF Mono, Menlo, Monaco, monospace" fill="#8b5cf6">Task.detached</tspan>
  </text>

  <!-- Series badge -->
  <rect x="20" y="470" width="140" height="26" rx="6" fill="#1e293b"/>
  <text x="90" y="487" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="10" fill="#64748b">30-day iOS series · Day 2/30</text>

  <!-- NativeFirst badge -->
  <rect x="740" y="470" width="140" height="26" rx="6" fill="#1e293b"/>
  <text x="810" y="487" text-anchor="middle" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="10" fill="#64748b">nativefirst.dev</text>
</svg>
