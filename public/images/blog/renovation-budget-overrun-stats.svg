<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="450" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#f8fafc">Why Homeowners Go Over Budget</text>
  <line x1="280" y1="58" x2="520" y2="58" stroke="#f97316" stroke-width="2" opacity="0.6"/>

  <!-- 78% bar -->
  <g transform="translate(60, 85)">
    <rect x="0" y="0" width="680" height="52" rx="8" fill="#1e293b" opacity="0.8"/>
    <rect x="0" y="0" width="530" height="52" rx="8" fill="#ef4444" opacity="0.85"/>
    <text x="20" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#fff">78% exceeded their renovation budget</text>
    <text x="660" y="33" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8">78%</text>
  </g>

  <!-- 44% bar -->
  <g transform="translate(60, 150)">
    <rect x="0" y="0" width="680" height="52" rx="8" fill="#1e293b" opacity="0.8"/>
    <rect x="0" y="0" width="299" height="52" rx="8" fill="#f97316" opacity="0.85"/>
    <text x="20" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#fff">44% went over by $5,000+</text>
    <text x="660" y="33" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8">44%</text>
  </g>

  <!-- 35% bar -->
  <g transform="translate(60, 215)">
    <rect x="0" y="0" width="680" height="52" rx="8" fill="#1e293b" opacity="0.8"/>
    <rect x="0" y="0" width="238" height="52" rx="8" fill="#eab308" opacity="0.85"/>
    <text x="20" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#fff">35% went over by $10,000+</text>
    <text x="660" y="33" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8">35%</text>
  </g>

  <!-- 19% bar -->
  <g transform="translate(60, 280)">
    <rect x="0" y="0" width="680" height="52" rx="8" fill="#1e293b" opacity="0.8"/>
    <rect x="0" y="0" width="129" height="52" rx="8" fill="#a855f7" opacity="0.85"/>
    <text x="20" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#fff">19% had to stop mid-project</text>
    <text x="660" y="33" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8">19%</text>
  </g>

  <!-- Bottom callout -->
  <g transform="translate(60, 360)">
    <rect x="0" y="0" width="680" height="65" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="1" opacity="0.9"/>
    <text x="340" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#f97316">Nearly 1 in 5 renovations stop because the money runs out.</text>
    <text x="340" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">Source: Clever Real Estate survey of 1,000 homeowners</text>
  </g>
</svg>
