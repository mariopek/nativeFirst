<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="500" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="19" font-weight="bold" fill="#f8fafc">2026 Renovation Costs at a Glance</text>
  <line x1="260" y1="52" x2="540" y2="52" stroke="#f97316" stroke-width="2" opacity="0.6"/>

  <!-- KITCHEN SECTION -->
  <text x="210" y="85" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#f97316">🍳 Kitchen Remodel</text>

  <!-- Kitchen bars -->
  <g transform="translate(30, 100)" font-family="system-ui, -apple-system, sans-serif">
    <text x="0" y="18" font-size="12" fill="#94a3b8">Minor refresh</text>
    <rect x="115" y="5" width="240" height="20" rx="4" fill="#1e293b"/>
    <rect x="115" y="5" width="100" height="20" rx="4" fill="#22c55e" opacity="0.8"/>
    <text x="122" y="19" font-size="11" fill="#fff" font-weight="600">$10K - $20K</text>

    <text x="0" y="48" font-size="12" fill="#94a3b8">Mid-range</text>
    <rect x="115" y="35" width="240" height="20" rx="4" fill="#1e293b"/>
    <rect x="115" y="35" width="175" height="20" rx="4" fill="#f97316" opacity="0.8"/>
    <text x="122" y="49" font-size="11" fill="#fff" font-weight="600">$25K - $75K</text>

    <text x="0" y="78" font-size="12" fill="#94a3b8">Full gut job</text>
    <rect x="115" y="65" width="240" height="20" rx="4" fill="#1e293b"/>
    <rect x="115" y="65" width="240" height="20" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="122" y="79" font-size="11" fill="#fff" font-weight="600">$65K - $150K+</text>

    <text x="0" y="112" font-size="13" fill="#e2e8f0" font-weight="600">Avg: $27,000</text>
    <rect x="115" y="98" width="155" height="22" rx="4" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
    <text x="122" y="113" font-size="11" fill="#f97316">Cabinets: 30-40% of budget</text>
  </g>

  <!-- BATHROOM SECTION -->
  <text x="600" y="85" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#a78bfa">🚿 Bathroom Remodel</text>

  <g transform="translate(420, 100)" font-family="system-ui, -apple-system, sans-serif">
    <text x="0" y="18" font-size="12" fill="#94a3b8">Cosmetic update</text>
    <rect x="120" y="5" width="240" height="20" rx="4" fill="#1e293b"/>
    <rect x="120" y="5" width="80" height="20" rx="4" fill="#22c55e" opacity="0.8"/>
    <text x="127" y="19" font-size="11" fill="#fff" font-weight="600">$2.4K - $10K</text>

    <text x="0" y="48" font-size="12" fill="#94a3b8">Full remodel</text>
    <rect x="120" y="35" width="240" height="20" rx="4" fill="#1e293b"/>
    <rect x="120" y="35" width="150" height="20" rx="4" fill="#a78bfa" opacity="0.8"/>
    <text x="127" y="49" font-size="11" fill="#fff" font-weight="600">$9K - $30K</text>

    <text x="0" y="78" font-size="12" fill="#94a3b8">Master bath</text>
    <rect x="120" y="65" width="240" height="20" rx="4" fill="#1e293b"/>
    <rect x="120" y="65" width="220" height="20" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="127" y="79" font-size="11" fill="#fff" font-weight="600">$18K - $80K</text>

    <text x="0" y="112" font-size="13" fill="#e2e8f0" font-weight="600">Avg: $16,500</text>
    <rect x="120" y="98" width="170" height="22" rx="4" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
    <text x="127" y="113" font-size="11" fill="#a78bfa">#1 budget killer: plumbing</text>
  </g>

  <!-- Divider -->
  <line x1="400" y1="80" x2="400" y2="230" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- WHERE THE MONEY GOES section -->
  <text x="400" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#f8fafc">Where Your Renovation Dollar Goes</text>

  <!-- Stacked bar - Kitchen -->
  <g transform="translate(30, 290)" font-family="system-ui, -apple-system, sans-serif">
    <text x="0" y="14" font-size="12" fill="#94a3b8" font-weight="600">Kitchen</text>

    <!-- Full bar -->
    <rect x="80" y="0" width="690" height="28" rx="6" fill="#1e293b"/>
    <!-- Cabinets 35% -->
    <rect x="80" y="0" width="241" height="28" rx="6" fill="#f97316" opacity="0.9"/>
    <text x="155" y="18" font-size="11" fill="#fff" font-weight="600">Cabinets 35%</text>
    <!-- Labor 35% -->
    <rect x="321" y="0" width="241" height="28" fill="#3b82f6" opacity="0.8"/>
    <text x="400" y="18" font-size="11" fill="#fff" font-weight="600">Labor 35%</text>
    <!-- Countertops 10% -->
    <rect x="562" y="0" width="69" height="28" fill="#22c55e" opacity="0.8"/>
    <text x="570" y="18" font-size="9" fill="#fff">Tops 10%</text>
    <!-- Appliances 10% -->
    <rect x="631" y="0" width="69" height="28" fill="#eab308" opacity="0.7"/>
    <text x="636" y="18" font-size="9" fill="#fff">Appl. 10%</text>
    <!-- Other 10% -->
    <rect x="700" y="0" width="69" height="28" rx="0" fill="#a78bfa" opacity="0.7"/>
    <rect x="700" y="0" width="70" height="28" rx="6" fill="#a78bfa" opacity="0.7"/>
    <text x="710" y="18" font-size="9" fill="#fff">Other</text>
  </g>

  <!-- Stacked bar - Bathroom -->
  <g transform="translate(30, 335)" font-family="system-ui, -apple-system, sans-serif">
    <text x="0" y="14" font-size="12" fill="#94a3b8" font-weight="600">Bathroom</text>

    <rect x="80" y="0" width="690" height="28" rx="6" fill="#1e293b"/>
    <!-- Labor 40% -->
    <rect x="80" y="0" width="276" height="28" rx="6" fill="#3b82f6" opacity="0.8"/>
    <text x="170" y="18" font-size="11" fill="#fff" font-weight="600">Labor 40%</text>
    <!-- Plumbing 20% -->
    <rect x="356" y="0" width="138" height="28" fill="#ef4444" opacity="0.8"/>
    <text x="380" y="18" font-size="11" fill="#fff" font-weight="600">Plumbing 20%</text>
    <!-- Tile 15% -->
    <rect x="494" y="0" width="103" height="28" fill="#22c55e" opacity="0.8"/>
    <text x="510" y="18" font-size="11" fill="#fff">Tile 15%</text>
    <!-- Fixtures 15% -->
    <rect x="597" y="0" width="103" height="28" fill="#f97316" opacity="0.7"/>
    <text x="607" y="18" font-size="10" fill="#fff">Fixtures 15%</text>
    <!-- Other 10% -->
    <rect x="700" y="0" width="70" height="28" rx="6" fill="#a78bfa" opacity="0.7"/>
    <text x="710" y="18" font-size="9" fill="#fff">Other</text>
  </g>

  <!-- Regret stats -->
  <g transform="translate(30, 395)" font-family="system-ui, -apple-system, sans-serif">
    <rect x="0" y="0" width="740" height="85" rx="12" fill="#1e293b" opacity="0.8" stroke="#334155" stroke-width="1"/>
    <text x="370" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#e2e8f0">Renovation Regret by Generation</text>

    <!-- Gen Z -->
    <rect x="30" y="42" width="150" height="30" rx="6" fill="#ef4444" opacity="0.15"/>
    <text x="55" y="62" font-size="12" fill="#94a3b8">Gen Z</text>
    <text x="115" y="62" font-size="16" font-weight="bold" fill="#ef4444">89%</text>

    <!-- Millennials -->
    <rect x="210" y="42" width="170" height="30" rx="6" fill="#f97316" opacity="0.15"/>
    <text x="225" y="62" font-size="12" fill="#94a3b8">Millennials</text>
    <text x="315" y="62" font-size="16" font-weight="bold" fill="#f97316">82%</text>

    <!-- Gen X -->
    <rect x="410" y="42" width="140" height="30" rx="6" fill="#eab308" opacity="0.15"/>
    <text x="430" y="62" font-size="12" fill="#94a3b8">Gen X</text>
    <text x="498" y="62" font-size="16" font-weight="bold" fill="#eab308">67%</text>

    <!-- Boomers -->
    <rect x="580" y="42" width="140" height="30" rx="6" fill="#22c55e" opacity="0.15"/>
    <text x="598" y="62" font-size="12" fill="#94a3b8">Boomers</text>
    <text x="668" y="62" font-size="16" font-weight="bold" fill="#22c55e">51%</text>
  </g>
</svg>
