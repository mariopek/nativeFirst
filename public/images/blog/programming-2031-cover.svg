<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2031" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff006e"/>
      <stop offset="100%" style="stop-color:#ff4d6d"/>
    </linearGradient>
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5d4"/>
      <stop offset="100%" style="stop-color:#00bbf9"/>
    </linearGradient>
    <filter id="glow2031">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="630" fill="url(#bg2031)"/>

  <!-- Scanline overlay -->
  <g opacity="0.03">
    <line x1="0" y1="5" x2="1200" y2="5" stroke="white" stroke-width="1"/>
    <line x1="0" y1="10" x2="1200" y2="10" stroke="white" stroke-width="1"/>
    <line x1="0" y1="15" x2="1200" y2="15" stroke="white" stroke-width="1"/>
    <line x1="0" y1="20" x2="1200" y2="20" stroke="white" stroke-width="1"/>
    <line x1="0" y1="25" x2="1200" y2="25" stroke="white" stroke-width="1"/>
    <line x1="0" y1="30" x2="1200" y2="30" stroke="white" stroke-width="1"/>
    <line x1="0" y1="35" x2="1200" y2="35" stroke="white" stroke-width="1"/>
    <line x1="0" y1="40" x2="1200" y2="40" stroke="white" stroke-width="1"/>
    <line x1="0" y1="570" x2="1200" y2="570" stroke="white" stroke-width="1"/>
    <line x1="0" y1="575" x2="1200" y2="575" stroke="white" stroke-width="1"/>
    <line x1="0" y1="580" x2="1200" y2="580" stroke="white" stroke-width="1"/>
    <line x1="0" y1="585" x2="1200" y2="585" stroke="white" stroke-width="1"/>
    <line x1="0" y1="590" x2="1200" y2="590" stroke="white" stroke-width="1"/>
  </g>

  <!-- Big year text in background -->
  <text x="600" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="320" fill="white" opacity="0.03">2031</text>

  <!-- Left side: retro terminal -->
  <g transform="translate(60, 100)">
    <!-- Terminal frame -->
    <rect x="0" y="0" width="440" height="340" rx="16" fill="#0d1117" stroke="#ff006e" stroke-width="1.5" opacity="0.9"/>
    <rect x="0" y="0" width="440" height="36" rx="16" fill="#161b22"/>
    <rect x="0" y="24" width="440" height="12" fill="#161b22"/>
    <circle cx="20" cy="18" r="6" fill="#ff006e"/>
    <circle cx="40" cy="18" r="6" fill="#ffd60a"/>
    <circle cx="60" cy="18" r="6" fill="#00f5d4"/>
    <text x="220" y="22" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="11">developer-2031.exe</text>

    <!-- Terminal content -->
    <text x="16" y="66" fill="#00f5d4" font-family="monospace" font-size="13" filter="url(#softGlow)">$</text>
    <text x="30" y="66" fill="#c9d1d9" font-family="monospace" font-size="13"> ai build me a startup</text>

    <text x="16" y="92" fill="#8b949e" font-family="monospace" font-size="12">⏳ Generating 47 microservices...</text>
    <text x="16" y="112" fill="#8b949e" font-family="monospace" font-size="12">⏳ Adding blockchain (just in case)...</text>
    <text x="16" y="132" fill="#8b949e" font-family="monospace" font-size="12">⏳ Deploying to 12 clouds...</text>
    <text x="16" y="152" fill="#ffd60a" font-family="monospace" font-size="12">⚠️  Warning: nobody understands the code</text>
    <text x="16" y="172" fill="#00f5d4" font-family="monospace" font-size="12">✓  Ship it anyway (YOLO mode: ON)</text>

    <text x="16" y="208" fill="#00f5d4" font-family="monospace" font-size="13" filter="url(#softGlow)">$</text>
    <text x="30" y="208" fill="#c9d1d9" font-family="monospace" font-size="13"> explain what the code does</text>
    <text x="16" y="234" fill="#ff006e" font-family="monospace" font-size="12" filter="url(#softGlow)">❌ Error: even the AI doesn't know</text>

    <text x="16" y="270" fill="#00f5d4" font-family="monospace" font-size="13" filter="url(#softGlow)">$</text>
    <text x="30" y="270" fill="#c9d1d9" font-family="monospace" font-size="13"> hire a human programmer</text>
    <text x="16" y="296" fill="#ffd60a" font-family="monospace" font-size="12">🦄 404: Species not found</text>
    <text x="16" y="316" fill="#8b949e" font-family="monospace" font-size="11">   (try: "prompt engineer" instead)</text>
  </g>

  <!-- Right side: timeline -->
  <g transform="translate(580, 80)">
    <!-- Timeline line -->
    <line x1="30" y1="20" x2="30" y2="360" stroke="#ff006e" stroke-width="2" opacity="0.4"/>

    <!-- 2026 -->
    <circle cx="30" cy="40" r="8" fill="#ff006e" filter="url(#softGlow)"/>
    <text x="54" y="36" fill="#8b949e" font-family="monospace" font-size="12">2026</text>
    <text x="54" y="54" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="14" font-weight="600">"AI will replace us"</text>

    <!-- 2028 -->
    <circle cx="30" cy="120" r="8" fill="#ffd60a" filter="url(#softGlow)"/>
    <text x="54" y="116" fill="#8b949e" font-family="monospace" font-size="12">2028</text>
    <text x="54" y="134" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="14" font-weight="600">"OK maybe not replace, but..."</text>

    <!-- 2030 -->
    <circle cx="30" cy="200" r="8" fill="#00bbf9" filter="url(#softGlow)"/>
    <text x="54" y="196" fill="#8b949e" font-family="monospace" font-size="12">2030</text>
    <text x="54" y="214" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="14" font-weight="600">"We need people who get it"</text>

    <!-- 2031 -->
    <circle cx="30" cy="280" r="12" fill="#00f5d4" filter="url(#glow2031)"/>
    <text x="54" y="276" fill="#00f5d4" font-family="monospace" font-size="13" font-weight="700" filter="url(#softGlow)">2031</text>
    <text x="54" y="296" fill="white" font-family="system-ui, sans-serif" font-size="15" font-weight="700">"Send help"</text>

    <!-- Stats -->
    <g transform="translate(0, 330)">
      <rect x="10" y="0" width="530" height="50" rx="12" fill="white" opacity="0.04"/>
      <text x="40" y="30" fill="#ff006e" font-family="monospace" font-size="12" filter="url(#softGlow)">87% AI-generated</text>
      <text x="220" y="30" fill="#ffd60a" font-family="monospace" font-size="12">13% understood</text>
      <text x="385" y="30" fill="#00f5d4" font-family="monospace" font-size="12">0% documented</text>
    </g>
  </g>

  <!-- Title -->
  <text x="600" y="510" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="36" filter="url(#softGlow)">
    Programming in 2031: Our Honest Predictions
  </text>
  <text x="600" y="548" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="17">
    Spoiler: we're all prompt engineers now and nobody's happy about it
  </text>

  <!-- Branding -->
  <text x="600" y="608" text-anchor="middle" fill="#00f5d4" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="14" opacity="0.7">nativefirstapp.com</text>
</svg>