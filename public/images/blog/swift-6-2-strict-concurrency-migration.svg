<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050a18;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0c1a36;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#080d20;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a0f1a;stop-opacity:0.85" />
      <stop offset="100%" style="stop-color:#2a0a14;stop-opacity:0.85" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3a26;stop-opacity:0.85" />
      <stop offset="100%" style="stop-color:#0a2a1c;stop-opacity:0.85" />
    </linearGradient>
    <linearGradient id="swiftBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="14" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#6366f1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <ellipse cx="600" cy="340" rx="320" ry="200" fill="#3b82f6" opacity="0.04" filter="url(#bigGlow)"/>

  <!-- LEFT: BEFORE panel (red) -->
  <rect x="60" y="160" width="480" height="340" rx="14" fill="url(#redGrad)" stroke="#ef4444" stroke-width="1.4" stroke-opacity="0.45" filter="url(#subtleGlow)"/>
  <text x="84" y="195" font-family="'SF Mono', monospace" font-size="13" fill="#fca5a5" opacity="0.9">// BEFORE</text>
  <rect x="450" y="170" width="76" height="22" rx="11" fill="#ef4444" opacity="0.85"/>
  <text x="488" y="186" font-family="monospace" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">86 ERRORS</text>

  <text x="84" y="232" font-family="'SF Mono', monospace" font-size="14" fill="#e2e8f0" opacity="0.9">@MainActor class InvoiceViewModel {</text>
  <text x="100" y="252" font-family="'SF Mono', monospace" font-size="14" fill="#e2e8f0" opacity="0.9">@Published var invoices: [Invoice] = []</text>
  <text x="100" y="272" font-family="'SF Mono', monospace" font-size="14" fill="#e2e8f0" opacity="0.9">@Published var isLoading = false</text>
  <text x="100" y="292" font-family="'SF Mono', monospace" font-size="14" fill="#e2e8f0" opacity="0.9">@MainActor func load() async { ... }</text>
  <text x="84" y="312" font-family="'SF Mono', monospace" font-size="14" fill="#e2e8f0" opacity="0.9">}</text>

  <text x="84" y="356" font-family="'SF Mono', monospace" font-size="12" fill="#fca5a5" opacity="0.85">error: main actor-isolated property</text>
  <text x="84" y="374" font-family="'SF Mono', monospace" font-size="12" fill="#fca5a5" opacity="0.85">  'invoices' can not be mutated from</text>
  <text x="84" y="392" font-family="'SF Mono', monospace" font-size="12" fill="#fca5a5" opacity="0.85">  a nonisolated context</text>
  <text x="84" y="424" font-family="'SF Mono', monospace" font-size="12" fill="#fca5a5" opacity="0.85">error: type 'InvoiceRow' does not</text>
  <text x="84" y="442" font-family="'SF Mono', monospace" font-size="12" fill="#fca5a5" opacity="0.85">  conform to protocol 'Sendable'</text>
  <text x="84" y="474" font-family="'SF Mono', monospace" font-size="12" fill="#fca5a5" opacity="0.7">…and 84 more</text>

  <!-- ARROW between panels -->
  <line x1="555" y1="330" x2="640" y2="330" stroke="#3b82f6" stroke-width="2.5" opacity="0.85"/>
  <polygon points="640,322 658,330 640,338" fill="#3b82f6" opacity="0.85"/>

  <!-- RIGHT: AFTER panel (green) -->
  <rect x="660" y="160" width="480" height="340" rx="14" fill="url(#greenGrad)" stroke="#10b981" stroke-width="1.4" stroke-opacity="0.45" filter="url(#subtleGlow)"/>
  <text x="684" y="195" font-family="'SF Mono', monospace" font-size="13" fill="#86efac" opacity="0.9">// AFTER  ·  Swift 6.2 defaults</text>
  <rect x="1058" y="170" width="62" height="22" rx="11" fill="#10b981" opacity="0.85"/>
  <text x="1089" y="186" font-family="monospace" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">CLEAN</text>

  <text x="684" y="232" font-family="'SF Mono', monospace" font-size="14" fill="#e2e8f0" opacity="0.9">@Observable class InvoiceViewModel {</text>
  <text x="700" y="252" font-family="'SF Mono', monospace" font-size="14" fill="#e2e8f0" opacity="0.9">var invoices: [Invoice] = []</text>
  <text x="700" y="272" font-family="'SF Mono', monospace" font-size="14" fill="#e2e8f0" opacity="0.9">var isLoading = false</text>
  <text x="700" y="292" font-family="'SF Mono', monospace" font-size="14" fill="#e2e8f0" opacity="0.9">func load() async { ... }</text>
  <text x="684" y="312" font-family="'SF Mono', monospace" font-size="14" fill="#e2e8f0" opacity="0.9">}</text>

  <text x="684" y="356" font-family="'SF Mono', monospace" font-size="12" fill="#86efac" opacity="0.85">Build Settings →</text>
  <text x="684" y="374" font-family="'SF Mono', monospace" font-size="12" fill="#86efac" opacity="0.85">  Default Actor Isolation = MainActor</text>
  <text x="684" y="406" font-family="'SF Mono', monospace" font-size="12" fill="#86efac" opacity="0.7">3 nonisolated escape hatches</text>
  <text x="684" y="424" font-family="'SF Mono', monospace" font-size="12" fill="#86efac" opacity="0.7">1 real race condition fixed</text>
  <text x="684" y="442" font-family="'SF Mono', monospace" font-size="12" fill="#86efac" opacity="0.7">82 redundant @MainActor removed</text>
  <text x="684" y="474" font-family="'SF Mono', monospace" font-size="12" fill="#86efac" opacity="0.85">build &amp; test  ·  green</text>

  <!-- Header labels -->
  <text x="44" y="56" font-family="'SF Mono', 'Menlo', monospace" font-size="13" fill="#3b82f6" opacity="0.6">swift 6.2  ·  xcode 26  ·  invoize migration</text>
  <text x="44" y="82" font-family="'SF Mono', 'Menlo', monospace" font-size="12" fill="#64748b" opacity="0.8">day 3 of 30  ·  ios dev series</text>
  <text x="600" y="120" font-family="'SF Mono', 'Menlo', 'Monaco', monospace" font-size="32" font-weight="700" fill="url(#swiftBlue)" text-anchor="middle">strict concurrency migration  ·  before / after</text>

  <!-- Bottom summary band -->
  <rect x="60" y="540" width="1080" height="56" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1" opacity="0.85"/>
  <text x="600" y="563" font-family="'SF Mono', monospace" font-size="13" fill="#94a3b8" text-anchor="middle" opacity="0.85">86 errors  →  3 meaningful annotations  +  1 race condition fixed</text>
  <text x="600" y="582" font-family="'SF Mono', monospace" font-size="11" fill="#64748b" text-anchor="middle" opacity="0.7">Invoize  ·  ~40 view models  ·  one afternoon</text>

  <text x="1156" y="615" font-family="'SF Mono', monospace" font-size="11" fill="#475569" text-anchor="end" opacity="0.5">nativefirst.dev</text>
</svg>
