<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0f1020"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="200" cy="200" r="200" fill="#6366f1" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="1000" cy="450" r="250" fill="#06b6d4" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="600" cy="100" r="150" fill="#8b5cf6" opacity="0.05" filter="url(#blur2)"/>

  <!-- Brain map nodes - decorative -->
  <!-- Central node -->
  <circle cx="850" cy="315" r="45" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <circle cx="850" cy="315" r="8" fill="url(#accent)" opacity="0.6"/>

  <!-- Connected nodes -->
  <line x1="850" y1="315" x2="960" y2="220" stroke="url(#accent)" stroke-width="1.5" opacity="0.25"/>
  <circle cx="960" cy="220" r="25" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
  <circle cx="960" cy="220" r="5" fill="#6366f1" opacity="0.5"/>

  <line x1="850" y1="315" x2="1000" y2="350" stroke="url(#accent)" stroke-width="1.5" opacity="0.25"/>
  <circle cx="1000" cy="350" r="20" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.3"/>
  <circle cx="1000" cy="350" r="4" fill="#06b6d4" opacity="0.5"/>

  <line x1="850" y1="315" x2="930" y2="430" stroke="url(#accent)" stroke-width="1.5" opacity="0.25"/>
  <circle cx="930" cy="430" r="22" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.3"/>
  <circle cx="930" cy="430" r="5" fill="#8b5cf6" opacity="0.5"/>

  <line x1="850" y1="315" x2="750" y2="200" stroke="url(#accent)" stroke-width="1.5" opacity="0.25"/>
  <circle cx="750" cy="200" r="18" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
  <circle cx="750" cy="200" r="4" fill="#6366f1" opacity="0.5"/>

  <line x1="850" y1="315" x2="770" y2="440" stroke="url(#accent)" stroke-width="1.5" opacity="0.25"/>
  <circle cx="770" cy="440" r="28" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.3"/>
  <circle cx="770" cy="440" r="5" fill="#06b6d4" opacity="0.5"/>

  <!-- Sub-nodes -->
  <line x1="960" y1="220" x2="1050" y2="170" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <circle cx="1050" cy="170" r="12" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.2"/>

  <line x1="770" y1="440" x2="700" y2="510" stroke="#06b6d4" stroke-width="1" opacity="0.15"/>
  <circle cx="700" cy="510" r="14" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.2"/>

  <line x1="750" y1="200" x2="680" y2="140" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <circle cx="680" cy="140" r="10" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.2"/>

  <!-- Input icons row -->
  <!-- Link icon -->
  <rect x="80" y="470" width="50" height="50" rx="12" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
  <text x="105" y="502" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#6366f1" opacity="0.6" text-anchor="middle">🔗</text>

  <!-- PDF icon -->
  <rect x="150" y="470" width="50" height="50" rx="12" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
  <text x="175" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ef4444" opacity="0.6" text-anchor="middle">PDF</text>

  <!-- Image icon -->
  <rect x="220" y="470" width="50" height="50" rx="12" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
  <text x="245" y="502" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#06b6d4" opacity="0.6" text-anchor="middle">🖼</text>

  <!-- Audio icon -->
  <rect x="290" y="470" width="50" height="50" rx="12" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="315" y="502" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#8b5cf6" opacity="0.6" text-anchor="middle">🎧</text>

  <!-- Arrow from inputs to brain map -->
  <line x1="370" y1="495" x2="790" y2="315" stroke="url(#accent)" stroke-width="1.5" opacity="0.2" stroke-dasharray="6,4"/>

  <!-- Text content -->
  <text x="80" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#6366f1" letter-spacing="2">
    THINKBUD
  </text>

  <text x="80" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#ffffff">
    I Was Failing
  </text>
  <text x="80" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#ffffff">
    an Exam on a
  </text>
  <text x="80" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#accent)">
    Tram.
  </text>

  <text x="80" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8a8a9a">
    How a panic attack on public transit became an app.
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#6366f1" opacity="0.1"/>
  <text x="80" y="620" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8a8a9a">
    nativefirst.dev  •  March 2026
  </text>
</svg>
