<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#94a3b8" stroke-width="1" transform="translate(60,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#94a3b8" stroke-width="1" transform="translate(120,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#94a3b8" stroke-width="1" transform="translate(180,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#94a3b8" stroke-width="1" transform="translate(240,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#94a3b8" stroke-width="1" transform="translate(300,0)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#94a3b8" stroke-width="1" transform="translate(0,60)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#94a3b8" stroke-width="1" transform="translate(0,120)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#94a3b8" stroke-width="1" transform="translate(0,180)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#94a3b8" stroke-width="1" transform="translate(0,240)" />
  </g>

  <!-- LEFT SIDE: Real Programmer -->
  <g transform="translate(100, 120)">
    <!-- Terminal window -->
    <rect x="0" y="0" width="420" height="280" rx="12" fill="#1a1a2e" stroke="#22c55e" stroke-width="2" opacity="0.9"/>
    <circle cx="20" cy="18" r="6" fill="#ef4444"/>
    <circle cx="40" cy="18" r="6" fill="#fbbf24"/>
    <circle cx="60" cy="18" r="6" fill="#22c55e"/>
    <text x="200" y="22" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12">terminal — programmer</text>

    <!-- Code lines -->
    <text x="15" y="55" fill="#22c55e" font-family="monospace" font-size="13">$ git diff --staged</text>
    <text x="15" y="78" fill="#60a5fa" font-family="monospace" font-size="12">+ func validateInput(data: String) {</text>
    <text x="15" y="98" fill="#60a5fa" font-family="monospace" font-size="12">+   guard !data.isEmpty else {</text>
    <text x="15" y="118" fill="#60a5fa" font-family="monospace" font-size="12">+     throw ValidationError</text>
    <text x="15" y="138" fill="#60a5fa" font-family="monospace" font-size="12">+   }</text>
    <text x="15" y="158" fill="#94a3b8" font-family="monospace" font-size="12">  // sanitize, check auth, rate limit</text>
    <text x="15" y="178" fill="#22c55e" font-family="monospace" font-size="13">$ swift test</text>
    <text x="15" y="198" fill="#22c55e" font-family="monospace" font-size="12">✓ 47 tests passed (0.3s)</text>
    <text x="15" y="218" fill="#22c55e" font-family="monospace" font-size="13">$ git push origin main</text>
    <text x="15" y="240" fill="#4ade80" font-family="monospace" font-size="12">✓ Build succeeded. Deployed.</text>
    <text x="15" y="262" fill="#4ade80" font-family="monospace" font-size="12">✓ 0 vulnerabilities found.</text>
  </g>

  <!-- VS divider -->
  <g transform="translate(560, 200)">
    <rect x="0" y="0" width="80" height="80" rx="40" fill="none" stroke="url(#purpleGlow)" stroke-width="3"/>
    <text x="40" y="48" text-anchor="middle" fill="#a78bfa" font-family="Arial, sans-serif" font-weight="bold" font-size="28">VS</text>
  </g>

  <!-- RIGHT SIDE: Vibe Coder -->
  <g transform="translate(680, 120)">
    <!-- Chat window -->
    <rect x="0" y="0" width="420" height="280" rx="12" fill="#1a1a2e" stroke="#ef4444" stroke-width="2" opacity="0.9"/>
    <circle cx="20" cy="18" r="6" fill="#ef4444"/>
    <circle cx="40" cy="18" r="6" fill="#fbbf24"/>
    <circle cx="60" cy="18" r="6" fill="#22c55e"/>
    <text x="200" y="22" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12">chat — vibe coder</text>

    <!-- Chat messages -->
    <rect x="15" y="42" width="300" height="30" rx="8" fill="#374151"/>
    <text x="25" y="62" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12">make me an app that does everything</text>

    <rect x="100" y="80" width="310" height="30" rx="8" fill="#7c3aed" opacity="0.3"/>
    <text x="110" y="100" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="12">Here's your app! [Accept All] ✨</text>

    <rect x="15" y="118" width="280" height="30" rx="8" fill="#374151"/>
    <text x="25" y="138" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12">there's an error, fix it pls</text>

    <rect x="100" y="156" width="310" height="30" rx="8" fill="#7c3aed" opacity="0.3"/>
    <text x="110" y="176" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="12">Fixed! (rewrote entire codebase) ✨</text>

    <rect x="15" y="194" width="320" height="30" rx="8" fill="#374151"/>
    <text x="25" y="214" fill="#fca5a5" font-family="Arial, sans-serif" font-size="12">WHY IS MY DATABASE PUBLIC?? 😱</text>

    <rect x="15" y="232" width="390" height="36" rx="8" fill="#dc2626" opacity="0.2"/>
    <text x="25" y="249" fill="#fca5a5" font-family="monospace" font-size="11">ERROR: 72,000 records exposed. API keys</text>
    <text x="25" y="263" fill="#fca5a5" font-family="monospace" font-size="11">leaked. $4,200 AWS bill. Send help.</text>
  </g>

  <!-- Title -->
  <text x="600" y="480" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-weight="bold" font-size="36">
    Why Knowing Code Still Beats Vibing It
  </text>
  <text x="600" y="520" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="20">
    Programmers vs Vibe Coders — The 2026 Reality Check
  </text>

  <!-- NativeFirst branding -->
  <text x="600" y="600" text-anchor="middle" fill="#7c3aed" font-family="Arial, sans-serif" font-weight="bold" font-size="16">nativefirstapp.com</text>
</svg>