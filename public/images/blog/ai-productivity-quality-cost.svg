<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="420" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">The Hidden Cost of "Faster"</text>
  <text x="450" y="58" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="12">What happens when AI writes the code but nobody checks the receipts</text>

  <!-- Bar chart area -->
  <!-- Baseline label -->
  <text x="100" y="360" fill="#6b7280" font-family="monospace" font-size="10">baseline (human-written)</text>
  <line x1="100" y1="340" x2="800" y2="340" stroke="#374151" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Bar 1: Uplevel - 41% more bugs -->
  <g transform="translate(160, 0)">
    <rect x="0" y="175" width="100" height="165" rx="4" fill="#ef4444" opacity="0.25" stroke="#ef4444" stroke-width="1"/>
    <rect x="0" y="340" width="100" height="0" rx="4" fill="#374151" opacity="0.3"/>
    <text x="50" y="165" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="28" font-weight="800" filter="url(#glow)">+41%</text>
    <text x="50" y="375" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11" font-weight="600">More Bugs</text>
    <text x="50" y="392" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="9">Uplevel / 800 devs</text>
  </g>

  <!-- Bar 2: CodeRabbit - 2.74x security vulns -->
  <g transform="translate(330, 0)">
    <rect x="0" y="100" width="100" height="240" rx="4" fill="#f59e0b" opacity="0.25" stroke="#f59e0b" stroke-width="1"/>
    <text x="50" y="90" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="28" font-weight="800" filter="url(#glow)">2.74x</text>
    <text x="50" y="375" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Security Vulns</text>
    <text x="50" y="392" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="9">CodeRabbit / 470 PRs</text>
  </g>

  <!-- Bar 3: GitClear - code churn increase -->
  <g transform="translate(500, 0)">
    <rect x="0" y="140" width="100" height="200" rx="4" fill="#9333ea" opacity="0.25" stroke="#9333ea" stroke-width="1"/>
    <text x="50" y="130" text-anchor="middle" fill="#9333ea" font-family="system-ui, sans-serif" font-size="28" font-weight="800" filter="url(#glow)">4x</text>
    <text x="50" y="375" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Code Clones</text>
    <text x="50" y="392" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="9">GitClear / 2025 data</text>
  </g>

  <!-- Bar 4: DORA - delivery stability decline -->
  <g transform="translate(670, 0)">
    <rect x="0" y="285" width="100" height="55" rx="4" fill="#06b6d4" opacity="0.25" stroke="#06b6d4" stroke-width="1"/>
    <text x="50" y="275" text-anchor="middle" fill="#06b6d4" font-family="system-ui, sans-serif" font-size="28" font-weight="800" filter="url(#glow)">-7.2%</text>
    <text x="50" y="375" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Stability</text>
    <text x="50" y="392" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="9">DORA / delivery</text>
  </g>

  <!-- Source line -->
  <text x="450" y="415" text-anchor="middle" fill="#4b5563" font-family="monospace" font-size="9">Sources: Uplevel Data Labs, CodeRabbit, GitClear AI Research, DORA Impact Report</text>
</svg>