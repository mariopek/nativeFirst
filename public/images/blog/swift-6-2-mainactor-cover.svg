<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050a18;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0c1a36;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#080d20;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="swiftBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a6e;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#1e2d5c;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="threadGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="threadBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="threadPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#6366f1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Ambient glow center -->
  <ellipse cx="600" cy="315" rx="280" ry="180" fill="#3b82f6" opacity="0.04" filter="url(#bigGlow)"/>

  <!-- Incoming thread lines — left side converging to badge -->
  <!-- Thread 1 (top) -->
  <line x1="60" y1="160" x2="320" y2="280" stroke="url(#threadGreen)" stroke-width="1.5" opacity="0.7"/>
  <!-- Thread 2 (middle-top) -->
  <line x1="60" y1="240" x2="320" y2="295" stroke="url(#threadBlue)" stroke-width="1.5" opacity="0.7"/>
  <!-- Thread 3 (middle) -->
  <line x1="60" y1="315" x2="320" y2="315" stroke="url(#threadPurple)" stroke-width="2" opacity="0.8"/>
  <!-- Thread 4 (middle-bottom) -->
  <line x1="60" y1="390" x2="320" y2="335" stroke="url(#threadBlue)" stroke-width="1.5" opacity="0.7"/>
  <!-- Thread 5 (bottom) -->
  <line x1="60" y1="470" x2="320" y2="350" stroke="url(#threadGreen)" stroke-width="1.5" opacity="0.7"/>

  <!-- Thread dots on left -->
  <circle cx="60" cy="160" r="4" fill="#10b981" opacity="0.6" filter="url(#subtleGlow)"/>
  <circle cx="60" cy="240" r="4" fill="#3b82f6" opacity="0.6" filter="url(#subtleGlow)"/>
  <circle cx="60" cy="315" r="5" fill="#a855f7" opacity="0.7" filter="url(#subtleGlow)"/>
  <circle cx="60" cy="390" r="4" fill="#3b82f6" opacity="0.6" filter="url(#subtleGlow)"/>
  <circle cx="60" cy="470" r="4" fill="#10b981" opacity="0.6" filter="url(#subtleGlow)"/>

  <!-- Small labels for threads -->
  <text x="80" y="155" font-family="monospace" font-size="11" fill="#10b981" opacity="0.55">URLSession.shared</text>
  <text x="80" y="235" font-family="monospace" font-size="11" fill="#3b82f6" opacity="0.55">Task.detached</text>
  <text x="80" y="310" font-family="monospace" font-size="11" fill="#a855f7" opacity="0.65">DispatchQueue.main</text>
  <text x="80" y="385" font-family="monospace" font-size="11" fill="#3b82f6" opacity="0.55">background queue</text>
  <text x="80" y="465" font-family="monospace" font-size="11" fill="#10b981" opacity="0.55">async let</text>

  <!-- Center badge / pill -->
  <rect x="320" y="255" width="560" height="120" rx="20" fill="url(#badgeGrad)" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.4" filter="url(#subtleGlow)"/>

  <!-- @MainActor text -->
  <text x="600" y="325" font-family="'SF Mono', 'Menlo', 'Monaco', monospace" font-size="52" font-weight="700" fill="url(#swiftBlue)" text-anchor="middle" filter="url(#glow)">@MainActor</text>
  <text x="600" y="356" font-family="'SF Mono', 'Menlo', 'Monaco', monospace" font-size="16" fill="#94a3b8" text-anchor="middle" opacity="0.7">by default  ·  Swift 6.2</text>

  <!-- DEFAULT badge top-right of pill -->
  <rect x="790" y="248" width="80" height="22" rx="11" fill="#10b981" opacity="0.85"/>
  <text x="830" y="263" font-family="monospace" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">DEFAULT</text>

  <!-- Outgoing single thread — right side -->
  <line x1="880" y1="315" x2="1100" y2="315" stroke="#3b82f6" stroke-width="2.5" opacity="0.7"/>
  <circle cx="1100" cy="315" r="8" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.8" filter="url(#glow)"/>
  <circle cx="1100" cy="315" r="3" fill="#3b82f6" opacity="0.9"/>
  <text x="1115" y="310" font-family="monospace" font-size="11" fill="#3b82f6" opacity="0.7">main</text>
  <text x="1115" y="325" font-family="monospace" font-size="11" fill="#3b82f6" opacity="0.7">thread</text>

  <!-- Nonisolated escape hatch (small, bottom right) -->
  <rect x="830" y="420" width="220" height="36" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1" opacity="0.7"/>
  <text x="850" y="443" font-family="monospace" font-size="13" fill="#94a3b8" opacity="0.8">nonisolated  →  opt out</text>

  <!-- Swift 6.2 label top left -->
  <text x="44" y="56" font-family="'SF Mono', 'Menlo', monospace" font-size="13" fill="#3b82f6" opacity="0.6">swift 6.2  ·  xcode 26</text>

  <!-- Day label -->
  <text x="44" y="82" font-family="'SF Mono', 'Menlo', monospace" font-size="12" fill="#64748b" opacity="0.8">day 1 of 30  ·  ios dev series</text>

  <!-- NativeFirst watermark -->
  <text x="1156" y="610" font-family="'SF Mono', 'Menlo', monospace" font-size="11" fill="#475569" text-anchor="end" opacity="0.5">nativefirst.dev</text>
</svg>
