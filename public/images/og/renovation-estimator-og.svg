<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="ogBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="ogAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6e00"/>
      <stop offset="100%" style="stop-color:#ffd600"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#ff6e00;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ff6e00;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" style="stop-color:#00b0ff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00b0ff;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#ogBg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Accent line at top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#ogAccent)"/>

  <!-- Main content -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">

    <!-- Renovise icon placeholder (simple house) -->
    <g transform="translate(100, 180)">
      <rect width="80" height="80" rx="18" fill="#1a1a1a" stroke="#ff6e00" stroke-width="2"/>
      <g transform="translate(40, 38)">
        <path d="M0-20 L-22 2 L-18 2 L-18 18 L18 18 L18 2 L22 2 Z"
              fill="none" stroke="#ff6e00" stroke-width="2.5" stroke-linejoin="round"/>
        <rect x="-5" y="4" width="10" height="14" rx="1" fill="none" stroke="#ff6e00" stroke-width="2"/>
      </g>
    </g>

    <!-- App name -->
    <text x="200" y="215" font-size="28" font-weight="700" fill="#888888" letter-spacing="0.05em">RENOVISE</text>

    <!-- Main headline -->
    <text x="100" y="330" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-0.02em">Free Home Renovation</text>
    <text x="100" y="400" font-size="56" font-weight="800" fill="url(#ogAccent)" letter-spacing="-0.02em">Cost Estimator</text>

    <!-- Subtitle -->
    <text x="100" y="460" font-size="22" fill="#888888">Instant estimates for any room, adjusted for your ZIP code.</text>
    <text x="100" y="490" font-size="22" fill="#888888">No signup required.</text>

    <!-- US badge -->
    <g transform="translate(100, 530)">
      <rect width="220" height="32" rx="16" fill="#1a1a1a" stroke="#222222" stroke-width="1"/>
      <circle cx="20" cy="16" r="6" fill="none" stroke="#888888" stroke-width="1.5"/>
      <text x="36" y="21" font-size="13" fill="#888888" font-weight="600">US MARKET ONLY</text>
    </g>

    <!-- NativeFirst branding -->
    <text x="1100" y="580" text-anchor="end" font-size="16" fill="#444444" font-weight="600">nativefirstapp.com</text>

    <!-- Room icons on the right side -->
    <g transform="translate(880, 160)" opacity="0.6">
      <rect width="240" height="56" rx="12" fill="#1a1a1a" stroke="#222" stroke-width="1"/>
      <text x="20" y="36" font-size="24">&#x1F6C1;</text>
      <text x="56" y="33" font-size="15" fill="#e0e0e0" font-weight="600">Bathroom</text>
      <text x="200" y="33" font-size="13" fill="#ff6e00" text-anchor="end">$3K-$100K</text>
    </g>
    <g transform="translate(880, 230)" opacity="0.6">
      <rect width="240" height="56" rx="12" fill="#1a1a1a" stroke="#222" stroke-width="1"/>
      <text x="20" y="36" font-size="24">&#x1F373;</text>
      <text x="56" y="33" font-size="15" fill="#e0e0e0" font-weight="600">Kitchen</text>
      <text x="200" y="33" font-size="13" fill="#ff6e00" text-anchor="end">$5K-$150K</text>
    </g>
    <g transform="translate(880, 300)" opacity="0.6">
      <rect width="240" height="56" rx="12" fill="#1a1a1a" stroke="#222" stroke-width="1"/>
      <text x="20" y="36" font-size="24">&#x2B07;&#xFE0F;</text>
      <text x="56" y="33" font-size="15" fill="#e0e0e0" font-weight="600">Basement</text>
      <text x="200" y="33" font-size="13" fill="#ff6e00" text-anchor="end">$3K-$150K</text>
    </g>
    <g transform="translate(880, 370)" opacity="0.4">
      <rect width="240" height="56" rx="12" fill="#1a1a1a" stroke="#222" stroke-width="1"/>
      <text x="20" y="36" font-size="24">&#x1F3E0;</text>
      <text x="56" y="33" font-size="15" fill="#e0e0e0" font-weight="600">Whole House</text>
      <text x="200" y="33" font-size="13" fill="#ff6e00" text-anchor="end">$10K-$600K</text>
    </g>
    <g transform="translate(880, 440)" opacity="0.25">
      <rect width="240" height="56" rx="12" fill="#1a1a1a" stroke="#222" stroke-width="1"/>
      <text x="100" y="36" font-size="14" fill="#555" text-anchor="middle">+ 4 more rooms</text>
    </g>

  </g>
</svg>
