<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="houseFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff7a1a"/>
      <stop offset="100%" style="stop-color:#ff5500"/>
    </linearGradient>
    <linearGradient id="tape" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd600"/>
      <stop offset="100%" style="stop-color:#ffab00"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="112" ry="112" fill="#1a1a1a"/>

  <!-- House -->
  <g transform="translate(256, 248)">
    <!-- Roof (triangle) -->
    <path d="M0-130 L-120-10 L-100-10 L-100 90 L100 90 L100-10 L120-10 Z"
          fill="none" stroke="url(#houseFill)" stroke-width="12" stroke-linejoin="round"/>
    <!-- Fill house body only -->
    <rect x="-100" y="-10" width="200" height="100" rx="2" fill="#1a1a1a"/>
    <!-- Redraw house walls -->
    <line x1="-100" y1="-10" x2="-100" y2="90" stroke="url(#houseFill)" stroke-width="12" stroke-linecap="round"/>
    <line x1="100" y1="-10" x2="100" y2="90" stroke="url(#houseFill)" stroke-width="12" stroke-linecap="round"/>
    <line x1="-100" y1="90" x2="100" y2="90" stroke="url(#houseFill)" stroke-width="12" stroke-linecap="round"/>
    <!-- Roof lines -->
    <line x1="-120" y1="-10" x2="0" y2="-130" stroke="url(#houseFill)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="120" y1="-10" x2="0" y2="-130" stroke="url(#houseFill)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Door -->
    <rect x="-20" y="25" width="40" height="65" rx="4" fill="none" stroke="url(#houseFill)" stroke-width="8"/>
    <!-- Door knob -->
    <circle cx="14" cy="58" r="4" fill="url(#houseFill)"/>
    <!-- Window left -->
    <rect x="-75" y="10" width="35" height="30" rx="3" fill="none" stroke="url(#houseFill)" stroke-width="7"/>
    <line x1="-57.5" y1="10" x2="-57.5" y2="40" stroke="url(#houseFill)" stroke-width="4"/>
    <line x1="-75" y1="25" x2="-40" y2="25" stroke="url(#houseFill)" stroke-width="4"/>
    <!-- Window right -->
    <rect x="40" y="10" width="35" height="30" rx="3" fill="none" stroke="url(#houseFill)" stroke-width="7"/>
    <line x1="57.5" y1="10" x2="57.5" y2="40" stroke="url(#houseFill)" stroke-width="4"/>
    <line x1="40" y1="25" x2="75" y2="25" stroke="url(#houseFill)" stroke-width="4"/>
  </g>

  <!-- Measuring tape curving around bottom-right -->
  <g transform="translate(256, 248)">
    <!-- Tape body -->
    <path d="M60 90 Q145 85 145 10 Q145-60 100-110"
          stroke="url(#tape)" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- Tape end tab -->
    <rect x="90" y="-124" width="24" height="30" rx="4" fill="url(#tape)" transform="rotate(-50, 100, -110)"/>
    <!-- Tick marks along tape -->
    <line x1="144" y1="50" x2="130" y2="50" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="146" y1="30" x2="134" y2="30" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="146" y1="10" x2="132" y2="10" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="144" y1="-10" x2="132" y2="-12" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="140" y1="-30" x2="128" y2="-34" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="135" y1="-50" x2="124" y2="-54" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="128" y1="-68" x2="118" y2="-74" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="118" y1="-84" x2="108" y2="-90" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="145" y1="70" x2="133" y2="70" stroke="#1a1a1a" stroke-width="2"/>
  </g>
</svg>
