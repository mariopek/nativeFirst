<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#E84E1B"/>
    </linearGradient>
    <linearGradient id="tape" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD600"/>
      <stop offset="100%" style="stop-color:#FFC107"/>
    </linearGradient>
    <clipPath id="roundedRect">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- House shape -->
  <g transform="translate(256, 240)">
    <!-- Roof -->
    <path d="M0-120 L-110 0 L-90 0 L-90 80 L90 80 L90 0 L110 0 Z"
          fill="white" opacity="0.95"/>
    <!-- Door -->
    <rect x="-22" y="20" width="44" height="60" rx="4" fill="url(#bg)" opacity="0.7"/>
    <!-- Window left -->
    <rect x="-70" y="10" width="32" height="28" rx="4" fill="url(#bg)" opacity="0.5"/>
    <!-- Window right -->
    <rect x="38" y="10" width="32" height="28" rx="4" fill="url(#bg)" opacity="0.5"/>
  </g>

  <!-- Measuring tape curve -->
  <g transform="translate(256, 240)">
    <path d="M95 80 Q160 60 140 -40 Q125 -100 60 -115"
          stroke="url(#tape)" stroke-width="16" fill="none" stroke-linecap="round"/>
    <!-- Tape tick marks -->
    <line x1="138" y1="-20" x2="128" y2="-16" stroke="white" stroke-width="2.5" opacity="0.9"/>
    <line x1="143" y1="0" x2="133" y2="2" stroke="white" stroke-width="2.5" opacity="0.9"/>
    <line x1="145" y1="20" x2="135" y2="20" stroke="white" stroke-width="2.5" opacity="0.9"/>
    <line x1="140" y1="40" x2="130" y2="38" stroke="white" stroke-width="2.5" opacity="0.9"/>
    <line x1="130" y1="60" x2="122" y2="56" stroke="white" stroke-width="2.5" opacity="0.9"/>
    <line x1="120" y1="-60" x2="112" y2="-54" stroke="white" stroke-width="2.5" opacity="0.9"/>
    <line x1="108" y1="-80" x2="100" y2="-72" stroke="white" stroke-width="2.5" opacity="0.9"/>
    <line x1="90" y1="-100" x2="82" y2="-92" stroke="white" stroke-width="2.5" opacity="0.9"/>
  </g>
</svg>
