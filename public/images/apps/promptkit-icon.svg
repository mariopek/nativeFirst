<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3CE9"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>
  <!-- Terminal bracket -->
  <g transform="translate(256, 240)">
    <!-- Left bracket > -->
    <path d="M-100,-60 L-40,0 L-100,60" stroke="white" stroke-width="24" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
    <!-- Cursor line -->
    <rect x="-20" y="-4" width="80" height="8" rx="4" fill="white" opacity="0.9"/>
    <!-- Sparkle top right -->
    <g transform="translate(90, -50)">
      <path d="M0,-18 L4,-4 L18,0 L4,4 L0,18 L-4,4 L-18,0 L-4,-4 Z" fill="#FCD34D" opacity="0.9"/>
    </g>
    <!-- Small sparkle -->
    <g transform="translate(60, -75)">
      <path d="M0,-10 L2.5,-2.5 L10,0 L2.5,2.5 L0,10 L-2.5,2.5 L-10,0 L-2.5,-2.5 Z" fill="#FCD34D" opacity="0.7"/>
    </g>
  </g>
  <!-- Text "PK" stylized -->
  <text x="256" y="395" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="64" fill="white" text-anchor="middle" opacity="0.3" letter-spacing="8">PROMPTKIT</text>
</svg>