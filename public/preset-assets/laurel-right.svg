<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" fill="none">
  <!-- Curved branch (mirror of laurel-left) -->
  <path d="M 20 30 Q 140 200, 20 370" stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Leaves: paired ellipses curling off the branch -->
  <g fill="#ffffff">
    <ellipse cx="30" cy="55" rx="32" ry="9" transform="rotate(30 30 55)"/>
    <ellipse cx="57" cy="90" rx="36" ry="10" transform="rotate(50 57 90)"/>
    <ellipse cx="82" cy="135" rx="38" ry="11" transform="rotate(70 82 135)"/>
    <ellipse cx="100" cy="190" rx="40" ry="12" transform="rotate(90 100 190)"/>
    <ellipse cx="100" cy="240" rx="40" ry="12" transform="rotate(95 100 240)"/>
    <ellipse cx="82" cy="285" rx="38" ry="11" transform="rotate(110 82 285)"/>
    <ellipse cx="57" cy="320" rx="36" ry="10" transform="rotate(130 57 320)"/>
    <ellipse cx="30" cy="355" rx="32" ry="9" transform="rotate(150 30 355)"/>
  </g>
</svg>
