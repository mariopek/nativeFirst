    <ellipse cx="143" cy="90" rx="36" ry="10" transform="rotate(-50 143 90)"/>
    <ellipse cx="118" cy="135" rx="38" ry="11" transform="rotate(-70 118 135)"/>
    <ellipse cx="100" cy="190" rx="40" ry="12" transform="rotate(-90 100 190)"/>
    <ellipse cx="100" cy="240" rx="40" ry="12" transform="rotate(-95 100 240)"/>
    <ellipse cx="118" cy="285" rx="38" ry="11" transform="rotate(-110 118 285)"/>
    <ellipse cx="143" cy="320" rx="36" ry="10" transform="rotate(-130 143 320)"/>
    <ellipse cx="170" cy="355" rx="32" ry="9" transform="rotate(-150 170 355)"/>
  </g>
</svg>
